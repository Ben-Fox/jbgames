<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1118;color:#e8dfd5;font-family:'Segoe UI',Roboto,'Helvetica Neue',sans-serif;overflow:hidden;height:100vh;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none}
#homeBtn{position:fixed;top:10px;left:10px;z-index:9999;background:rgba(255,255,255,.12);color:#e8dfd5;text-decoration:none;padding:6px 14px;border-radius:20px;font-size:14px;font-family:sans-serif;opacity:.7;transition:opacity .2s;backdrop-filter:blur(4px)}
#homeBtn:hover{opacity:1}
#wrap{position:relative;display:flex;flex-direction:column;align-items:center;width:100%;max-width:600px}
#hud{display:flex;gap:24px;align-items:center;margin-bottom:12px;height:32px}
#hud span{font-size:13px;color:#a09888;font-weight:500}
#hud .val{color:#d4a56a;font-weight:800;font-size:15px}
#actions{display:flex;gap:10px;margin-top:12px}
.btn{background:#8b5e3c;color:#fff;border:none;padding:8px 22px;border-radius:20px;font-size:13px;cursor:pointer;font-weight:700;transition:all .2s;box-shadow:0 3px 0 #5a3825;letter-spacing:.5px}
.btn:hover{background:#a06b42;transform:translateY(-1px)}
.btn:active{transform:translateY(1px);box-shadow:0 1px 0 #5a3825}
.btn.sm{background:#6b5b4e;box-shadow:0 3px 0 #4a3d33;padding:7px 16px;font-size:12px}
.btn.sm:hover{background:#7d6b5c}

/* 3D Scene */
#scene{width:300px;height:300px;perspective:800px;margin:0 auto;cursor:grab}
#scene:active{cursor:grabbing}
#box{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .1s ease-out;transform:rotateX(-25deg) rotateY(-35deg)}

.face{position:absolute;width:300px;height:300px;backface-visibility:visible;overflow:hidden;border:1px solid rgba(0,0,0,.3)}

/* Wood grain base - each face slightly different shade */
.face-front{transform:translateZ(150px);background:linear-gradient(180deg,#c8956e 0%,#b07d58 20%,#c49168 40%,#a8734f 60%,#be8b62 80%,#b5805a 100%)}
.face-back{transform:rotateY(180deg) translateZ(150px);background:linear-gradient(180deg,#ba8a62 0%,#a67550 20%,#b88660 40%,#9e6d48 60%,#b28058 80%,#a87852 100%)}
.face-right{transform:rotateY(90deg) translateZ(150px);background:linear-gradient(180deg,#c49168 0%,#ae7b56 20%,#c08d64 40%,#a6714e 60%,#bc8960 80%,#b27e58 100%)}
.face-left{transform:rotateY(-90deg) translateZ(150px);background:linear-gradient(180deg,#be8b62 0%,#a87852 20%,#ba8760 40%,#a2704c 60%,#b6835c 80%,#ac7a54 100%)}
.face-top{transform:rotateX(90deg) translateZ(150px);background:linear-gradient(180deg,#d4a478 0%,#c09060 20%,#cc9c70 40%,#b88660 60%,#c89868 80%,#be8e62 100%)}
.face-bottom{transform:rotateX(-90deg) translateZ(150px);background:linear-gradient(180deg,#a87852 0%,#946848 20%,#a07050 40%,#8c6040 60%,#9c6c4c 80%,#926444 100%)}

/* Wood grain overlay */
.face::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(92deg,transparent,transparent 8px,rgba(0,0,0,.04) 8px,rgba(0,0,0,.04) 9px,transparent 9px,transparent 20px);pointer-events:none;z-index:1}
.face::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(88deg,transparent,transparent 14px,rgba(255,255,255,.03) 14px,rgba(255,255,255,.03) 15px,transparent 15px,transparent 32px);pointer-events:none;z-index:1}

/* Sliding panels */
.panel{position:absolute;border-radius:2px;cursor:pointer;transition:transform .35s cubic-bezier(.25,.46,.45,.94);z-index:5;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.15),inset 0 -1px 0 rgba(0,0,0,.2),0 2px 6px rgba(0,0,0,.3)}
.panel:hover{filter:brightness(1.08)}
.panel.active{box-shadow:inset 0 1px 0 rgba(255,255,255,.15),inset 0 -1px 0 rgba(0,0,0,.2),0 2px 6px rgba(0,0,0,.3),0 0 12px rgba(212,165,106,.5)}
.panel.locked{cursor:default;opacity:.95}
.panel .pmark{font-size:11px;color:rgba(255,255,255,.5);font-weight:700;pointer-events:none;z-index:2;text-shadow:0 1px 2px rgba(0,0,0,.4)}

/* Panel wood varieties */
.pw-dark{background:linear-gradient(180deg,#6b4226,#5a3520,#6b4226)}
.pw-medium{background:linear-gradient(180deg,#8b5e3c,#7a4e30,#8b5e3c)}
.pw-light{background:linear-gradient(180deg,#c49168,#b07d58,#c49168)}
.pw-red{background:linear-gradient(180deg,#8b3a3a,#6e2c2c,#8b3a3a)}
.pw-ebony{background:linear-gradient(180deg,#3d2b1f,#2e1f15,#3d2b1f)}
.pw-maple{background:linear-gradient(180deg,#d4a56a,#c09050,#d4a56a)}
.pw-cherry{background:linear-gradient(180deg,#7b3f3f,#6a3232,#7b3f3f)}
.pw-walnut{background:linear-gradient(180deg,#5c4033,#4a3228,#5c4033)}

/* Decorative inlays on panels */
.panel::before{content:'';position:absolute;inset:4px;border:1px solid rgba(255,255,255,.08);border-radius:1px;pointer-events:none}

/* Lid indicator */
.lid-seam{position:absolute;z-index:10;pointer-events:none}
.lid-seam.top-seam{top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,rgba(0,0,0,.4),rgba(0,0,0,.2),rgba(0,0,0,.4))}

/* Level intro / win overlay */
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,10,8,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(6px)}
#overlay.hidden{display:none}
#overlay h1{font-size:42px;color:#d4a56a;margin-bottom:4px;text-shadow:2px 2px 0 rgba(0,0,0,.3);letter-spacing:-1px}
#overlay h2{font-size:22px;color:#d4a56a;margin-bottom:8px}
#overlay .sub{color:#a09888;font-size:14px;margin-bottom:20px;text-align:center;max-width:340px;line-height:1.6}
#overlay .stars{font-size:36px;margin-bottom:12px;letter-spacing:6px;color:#d4a56a}
#overlay .stat{color:#8a7e72;font-size:13px;margin-bottom:4px}

#lvlSelect{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:320px;margin-top:14px}
#lvlSelect .lbtn{width:54px;height:54px;background:rgba(255,255,255,.05);border:3px solid rgba(255,255,255,.1);border-radius:12px;color:#d4a56a;font-size:17px;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .2s;line-height:1.2;box-shadow:0 2px 6px rgba(0,0,0,.2)}
#lvlSelect .lbtn:hover{border-color:#d4a56a;transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
#lvlSelect .lbtn.done{border-color:#6b8b5e;background:rgba(107,139,94,.1)}
#lvlSelect .lbtn.locked{opacity:.35;cursor:default}
#lvlSelect .lbtn .best{font-size:9px;color:#6b8b5e;font-weight:700}

/* Hint glow */
@keyframes hintPulse{0%,100%{box-shadow:inset 0 1px 0 rgba(255,255,255,.15),0 0 8px rgba(212,165,106,.3)}50%{box-shadow:inset 0 1px 0 rgba(255,255,255,.15),0 0 20px rgba(212,165,106,.7)}}
.panel.hint{animation:hintPulse 1.2s ease-in-out infinite}

/* Win animation */
@keyframes lidOpen{0%{transform:rotateX(0)}100%{transform:rotateX(-120deg)}}
@keyframes boxGlow{0%{box-shadow:0 0 20px rgba(212,165,106,.3)}100%{box-shadow:0 0 60px rgba(212,165,106,.8)}}
#box.won{animation:boxGlow 1s ease-in-out}

/* Recommended cards */
.rec-wrap{margin-top:16px;text-align:center}
.rec-wrap h3{font-size:13px;color:#6b5e50;margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.rec-cards{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.rec-card{width:130px;border-radius:14px;overflow:hidden;text-decoration:none;color:#fff;transition:transform .25s;cursor:pointer;display:flex;flex-direction:column;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}
.rec-card:hover{transform:translateY(-4px) scale(1.03)}
.rec-card .rc-thumb{height:60px;display:flex;align-items:center;justify-content:center;font-size:24px}
.rec-card .rc-body{padding:8px 10px}
.rec-card .rc-title{font-size:12px;font-weight:700;margin-bottom:2px;color:#d4a56a}
.rec-card .rc-desc{font-size:10px;color:#8a7e72}

/* Responsive */
@media(max-width:480px){
  #scene{width:240px;height:240px}
  .face{width:240px;height:240px}
  .face-front{transform:translateZ(120px)}
  .face-back{transform:rotateY(180deg) translateZ(120px)}
  .face-right{transform:rotateY(90deg) translateZ(120px)}
  .face-left{transform:rotateY(-90deg) translateZ(120px)}
  .face-top{transform:rotateX(90deg) translateZ(120px)}
  .face-bottom{transform:rotateX(-90deg) translateZ(120px)}
  #overlay h1{font-size:32px}
}
@media(max-width:360px){
  #scene{width:200px;height:200px}
  .face{width:200px;height:200px}
  .face-front{transform:translateZ(100px)}
  .face-back{transform:rotateY(180deg) translateZ(100px)}
  .face-right{transform:rotateY(90deg) translateZ(100px)}
  .face-left{transform:rotateY(-90deg) translateZ(100px)}
  .face-top{transform:rotateX(90deg) translateZ(100px)}
  .face-bottom{transform:rotateX(-90deg) translateZ(100px)}
}

/* Instruction tooltip */
#instruct{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#a09888;padding:8px 16px;border-radius:20px;font-size:12px;z-index:40;backdrop-filter:blur(4px);transition:opacity .5s;text-align:center}
#instruct.fade{opacity:0}
</style>

      {face:'left',id:'m',x:.6,y:.35,w:.25,h:.08,dir:'x',dist:-.48,wood:'pw-red',seq:7},
      {face:'left',id:'n',x:.18,y:.55,w:.08,h:.2,dir:'y',dist:-.42,wood:'pw-ebony',seq:11},
      {face:'left',id:'o',x:.5,y:.75,w:.3,h:.08,dir:'x',dist:-.42,wood:'pw-dark',seq:15},
      {face:'back',id:'q',x:.08,y:.12,w:.3,h:.08,dir:'x',dist:.55,wood:'pw-maple',seq:4},
      {face:'back',id:'r',x:.55,y:.35,w:.3,h:.08,dir:'x',dist:-.42,wood:'pw-walnut',seq:8},
      {face:'back',id:'s',x:.1,y:.58,w:.25,h:.08,dir:'x',dist:.55,wood:'pw-cherry',seq:12},
      {face:'back',id:'t',x:.5,y:.78,w:.35,h:.08,dir:'x',dist:-.45,wood:'pw-light',seq:18},
      {face:'top',id:'u',x:.05,y:.1,w:.85,h:.1,dir:'x',dist:.06,wood:'pw-ebony',seq:20},
    ]},
  ];

  // ---- State ----
  var curLevel = 0;
  var moves = 0;
  var nextSeq = 1;     // which sequence step is next
  var maxSeq = 0;      // total steps in current level
  var panelEls = [];   // DOM elements
  var panelData = [];  // current level panel data with state
  var progress = [];   // per-level best moves (0 = not done)
  var rotX = -25, rotY = -35;
  var dragging = false, dragX, dragY;
  var won = false;
  var hintUsed = false;

  // ---- Init ----
  function init(){
    // Load progress
    try{ progress = JSON.parse(localStorage.getItem('gridlock_progress3')) || []; }catch(e){ progress = []; }
    while(progress.length < LEVELS.length) progress.push(0);

    // Touch/mouse rotation
    var scene = document.getElementById('scene');
    scene.addEventListener('mousedown', onDragStart);
    scene.addEventListener('mousemove', onDragMove);
    scene.addEventListener('mouseup', onDragEnd);
    scene.addEventListener('mouseleave', onDragEnd);
    scene.addEventListener('touchstart', onDragStart, {passive:false});
    scene.addEventListener('touchmove', onDragMove, {passive:false});
    scene.addEventListener('touchend', onDragEnd);

    showMenu();
    // Fade instruction
    setTimeout(function(){ var el=document.getElementById('instruct'); if(el) el.classList.add('fade'); }, 5000);
  }

  // ---- Rotation ----
  function onDragStart(e){
    if(won) return;
    var t = e.target;
    // Don't start drag on panels
    if(t.classList && t.classList.contains('panel')) return;
    dragging = true;
    var p = e.touches ? e.touches[0] : e;
    dragX = p.clientX; dragY = p.clientY;
    document.getElementById('box').style.transition = 'none';
    if(e.touches) e.preventDefault();
  }
  function onDragMove(e){
    if(!dragging) return;
    var p = e.touches ? e.touches[0] : e;
    var dx = p.clientX - dragX;
    var dy = p.clientY - dragY;
    rotY += dx * 0.5;
    rotX -= dy * 0.5;
    rotX = Math.max(-80, Math.min(80, rotX));
    dragX = p.clientX; dragY = p.clientY;
    updateBoxRotation();
    if(e.touches) e.preventDefault();
  }
  function onDragEnd(){
    dragging = false;
    document.getElementById('box').style.transition = 'transform .1s ease-out';
  }
  function updateBoxRotation(){
    document.getElementById('box').style.transform = 'rotateX('+rotX+'deg) rotateY('+rotY+'deg)';
  }

  // ---- Level loading ----
  function loadLevel(idx){
    curLevel = idx;
    moves = 0;
    nextSeq = 1;
    won = false;
    hintUsed = false;
    var lvl = LEVELS[idx];
    maxSeq = lvl.panels.filter(function(p){return p.seq>0}).length;

    document.getElementById('lvlNum').textContent = idx+1;
    document.getElementById('moveCount').textContent = '0';
    document.getElementById('parCount').textContent = lvl.par;
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('box').classList.remove('won');

    // Reset rotation to nice angle
    rotX = -25; rotY = -35;
    updateBoxRotation();

    // Clear old panels
    panelEls.forEach(function(el){ el.remove(); });
    panelEls = [];
    panelData = [];

    // Get box size
    var box = getBoxSize();

    // Create panel elements on each face
    lvl.panels.forEach(function(p, i){
      var face = document.querySelector('.face-'+p.face);
      if(!face) return;
      var el = document.createElement('div');
      el.className = 'panel ' + p.wood + (p.seq === nextSeq ? ' active' : ' locked');
      el.style.left = (p.x * box) + 'px';
      el.style.top = (p.y * box) + 'px';
      el.style.width = (p.w * box) + 'px';
      el.style.height = (p.h * box) + 'px';

      // Small decorative mark
      var mark = document.createElement('span');
      mark.className = 'pmark';
      // Show a subtle dot pattern based on sequence
      el.appendChild(mark);

      el.addEventListener('click', function(e){
        e.stopPropagation();
        trySlide(i);
      });
      el.addEventListener('touchend', function(e){
        e.stopPropagation();
        e.preventDefault();
        trySlide(i);
      });

      face.appendChild(el);
      panelEls.push(el);
      panelData.push({slid:false, def:p});
    });

    updatePanelStates();
  }

  // ---- Panel interaction ----
  function trySlide(idx){
    if(won) return;
    var pd = panelData[idx];
    if(pd.slid) return; // already moved
    if(pd.def.seq !== nextSeq) {
      // Wrong panel — subtle shake
      var el = panelEls[idx];
      el.style.transition = 'transform .05s';
      var dir = pd.def.dir;
      el.style.transform = 'translate('+(dir==='x'?'4px':'0')+','+(dir==='y'?'4px':'0')+')';
      setTimeout(function(){
        el.style.transform = 'translate('+(dir==='x'?'-4px':'0')+','+(dir==='y'?'-4px':'0')+')';
      },50);
      setTimeout(function(){
        el.style.transition = 'transform .35s cubic-bezier(.25,.46,.45,.94)';
        el.style.transform = 'translate(0,0)';
      },100);
      moves++;
      document.getElementById('moveCount').textContent = moves;
      return;
    }

    // Correct panel — slide it
    var box = getBoxSize();
    var el = panelEls[idx];
    var dx = pd.def.dir === 'x' ? pd.def.dist * box : 0;
    var dy = pd.def.dir === 'y' ? pd.def.dist * box : 0;
    el.style.transform = 'translate('+dx+'px,'+dy+'px)';
    el.classList.remove('active','hint');
    el.classList.add('locked');
    el.style.opacity = '.6';
    pd.slid = true;
    moves++;
    nextSeq++;
    document.getElementById('moveCount').textContent = moves;

    if(nextSeq > maxSeq){
      // WIN!
      won = true;
      setTimeout(winAnimation, 400);
    } else {
      updatePanelStates();
    }
  }

  function updatePanelStates(){
    panelData.forEach(function(pd,i){
      if(pd.slid) return;
      var el = panelEls[i];
      if(pd.def.seq === nextSeq){
        el.classList.remove('locked');
        el.classList.add('active');
      } else {
        el.classList.remove('active');
        el.classList.add('locked');
      }
    });
  }

  // ---- Win ----
  function winAnimation(){
    var box = document.getElementById('box');
    box.classList.add('won');

    // Animate to show top
    var startRX = rotX, startRY = rotY;
    var targetRX = 50, targetRY = rotY;
    var t0 = performance.now();
    function animRot(now){
      var p = Math.min(1, (now-t0)/800);
      var ease = 1 - Math.pow(1-p, 3);
      rotX = startRX + (targetRX-startRX)*ease;
      updateBoxRotation();
      if(p<1) requestAnimationFrame(animRot);
      else showWinOverlay();
    }
    requestAnimationFrame(animRot);

    // "Open" the top face
    var topFace = document.querySelector('.face-top');
    topFace.style.transformOrigin = 'top center';
    topFace.style.transition = 'transform 1s cubic-bezier(.25,.46,.45,.94)';
    setTimeout(function(){
      topFace.style.transform = 'rotateX(90deg) translateZ('+getBoxSize()/2+'px) rotateX(-110deg)';
    }, 300);
  }

  function showWinOverlay(){
    var lvl = LEVELS[curLevel];
    var par = lvl.par;
    var stars = moves <= par ? 3 : moves <= par+3 ? 2 : 1;
    var starStr = '';
    for(var i=0;i<3;i++) starStr += i<stars ? '★' : '☆';

    // Save progress
    if(!progress[curLevel] || moves < progress[curLevel]) progress[curLevel] = moves;
    localStorage.setItem('gridlock_progress3', JSON.stringify(progress));

    var ov = document.getElementById('overlay');
    var isLast = curLevel >= LEVELS.length-1;
    var html = '<h2>Box Opened!</h2>';
    html += '<div class="stars">'+starStr+'</div>';
    html += '<div class="stat">'+moves+' moves (par: '+par+')</div>';
    html += '<div class="stat" style="margin-bottom:16px">'+lvl.name+'</div>';
    if(!isLast){
      html += '<button class="btn" onclick="Game.loadLevel('+(curLevel+1)+')">Next Box →</button>';
    } else {
      html += '<div class="sub">You\'ve mastered all the puzzle boxes!</div>';
      html += '<div class="rec-wrap"><h3>More Games</h3><div class="rec-cards">';
      html += '<a class="rec-card" href="/circle/" style="background:linear-gradient(135deg,#1a1a2e,#16213e)"><div class="rc-thumb" style="background:radial-gradient(circle,#e94560 30%,transparent 70%)">●</div><div class="rc-body"><div class="rc-title">Circle</div><div class="rc-desc">Precision timing</div></div></a>';
      html += '<a class="rec-card" href="/breakpoint/" style="background:linear-gradient(135deg,#1a0a2e,#2d1b4e)"><div class="rc-thumb">⚔️</div><div class="rc-body"><div class="rc-title">BreakPoint</div><div class="rc-desc">Tactical card duel</div></div></a>';
      html += '<a class="rec-card" href="/likelihood/" style="background:linear-gradient(135deg,#0a1a2e,#1b3a4e)"><div class="rc-thumb">📊</div><div class="rc-body"><div class="rc-title">Likelihood</div><div class="rc-desc">Probability puzzles</div></div></a>';
      html += '</div></div>';
    }
    html += '<button class="btn sm" style="margin-top:12px" onclick="Game.showMenu()">All Levels</button>';
    ov.innerHTML = html;
    ov.classList.remove('hidden');
  }

  // ---- Menu ----
  function showMenu(){
    var ov = document.getElementById('overlay');
    var html = '<h1>GridLock</h1>';
    html += '<div class="sub">Slide the wooden panels in the correct sequence to unlock each puzzle box.<br>Drag to rotate. Tap a panel to slide it.</div>';
    html += '<div id="lvlSelect">';
    for(var i=0;i<LEVELS.length;i++){
      var locked = i>0 && !progress[i-1];
      var done = progress[i] > 0;
      var cls = done ? 'done' : locked ? 'locked' : '';
      html += '<button class="lbtn '+cls+'" '+(locked?'disabled':'')+' onclick="Game.loadLevel('+i+')">';
      html += (i+1);
      if(done) html += '<span class="best">'+progress[i]+'</span>';
      html += '</button>';
    }
    html += '</div>';
    ov.innerHTML = html;
    ov.classList.remove('hidden');
  }

  // ---- Hint ----
  function showHint(){
    if(won) return;
    hintUsed = true;
    // Find the next panel and pulse it
    panelData.forEach(function(pd,i){
      if(pd.def.seq === nextSeq && !pd.slid){
        var el = panelEls[i];
        el.classList.add('hint');
        // Also rotate box to show that face
        var face = pd.def.face;
        var targets = {front:[-25,-35],back:[-25,145],right:[-25,-125],left:[-25,55],top:[55,-35],bottom:[-55,-35]};
        var t = targets[face] || [-25,-35];
        var startRX = rotX, startRY = rotY;
        var t0 = performance.now();
        function animHint(now){
          var p = Math.min(1,(now-t0)/600);
          var ease = 1-Math.pow(1-p,3);
          rotX = startRX+(t[0]-startRX)*ease;
          rotY = startRY+(t[1]-startRY)*ease;
          updateBoxRotation();
          if(p<1) requestAnimationFrame(animHint);
        }
        requestAnimationFrame(animHint);
        setTimeout(function(){ el.classList.remove('hint'); }, 3000);
      }
    });
  }

  // ---- Reset ----
  function resetLevel(){
    loadLevel(curLevel);
  }

  // ---- Resize ----
  function onResize(){
    var box = getBoxSize();
    var scene = document.getElementById('scene');
    scene.style.width = box+'px';
    scene.style.height = box+'px';
    var half = box/2;
    // Update face sizes and transforms
    document.querySelectorAll('.face').forEach(function(f){
      f.style.width = box+'px';
      f.style.height = box+'px';
    });
    document.querySelector('.face-front').style.transform = 'translateZ('+half+'px)';
    document.querySelector('.face-back').style.transform = 'rotateY(180deg) translateZ('+half+'px)';
    document.querySelector('.face-right').style.transform = 'rotateY(90deg) translateZ('+half+'px)';
    document.querySelector('.face-left').style.transform = 'rotateY(-90deg) translateZ('+half+'px)';
    document.querySelector('.face-top').style.transform = 'rotateX(90deg) translateZ('+half+'px)';
    document.querySelector('.face-bottom').style.transform = 'rotateX(-90deg) translateZ('+half+'px)';
    // Reload level if playing
    if(!document.getElementById('overlay').classList.contains('hidden')) return;
    loadLevel(curLevel);
  }
  window.addEventListener('resize', onResize);

  // ---- Start ----
  init();

  return {loadLevel:loadLevel, showMenu:showMenu, showHint:showHint, resetLevel:resetLevel};
})();

function showHint(){ Game.showHint(); }
function resetLevel(){ Game.resetLevel(); }
function showMenu(){ Game.showMenu(); }
</script>
</body>
</html>
