<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GridLock — BrainSmacks</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e0e12;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none}
#wrap{position:relative;display:flex;flex-direction:column;align-items:center}
#hud{display:flex;gap:20px;align-items:center;margin-bottom:10px;height:36px}
#hud span{font-size:14px;color:#b0b0b0}
#hud .val{color:#c084fc;font-weight:700}
#actions{display:flex;gap:10px;margin-top:10px}
.btn{background:#7c3aed;color:#fff;border:none;padding:8px 18px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;transition:background .2s}
.btn:hover{background:#6d28d9}
.btn.sm{background:#2a2a35;color:#c084fc;padding:6px 14px;font-size:12px}
.btn.sm:hover{background:#3a3a48}
canvas{display:block;border-radius:8px;cursor:grab}
canvas:active{cursor:grabbing}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(14,14,18,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;z-index:20}
#overlay.hidden{display:none}
#overlay h1{font-size:40px;color:#c084fc;margin-bottom:4px}
#overlay h2{font-size:22px;color:#c084fc;margin-bottom:8px}
#overlay .sub{color:#888;font-size:14px;margin-bottom:20px;text-align:center;max-width:340px;line-height:1.5}
#overlay .stars{font-size:32px;margin-bottom:12px;letter-spacing:4px;color:#c084fc}
#overlay .stat{color:#888;font-size:13px;margin-bottom:4px}
#lvlSelect{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:320px;margin-top:14px}
#lvlSelect .lbtn{width:48px;height:48px;background:#1e1e28;border:2px solid #333;border-radius:8px;color:#c084fc;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
#lvlSelect .lbtn:hover{border-color:#7c3aed;background:#2a2a38}
#lvlSelect .lbtn.done{border-color:#22c55e}
#lvlSelect .lbtn.locked{opacity:.35;cursor:default}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span>Level <span class="val" id="lvlNum">1</span></span>
    <span>Moves: <span class="val" id="moveCount">0</span></span>
    <span>Par: <span class="val" id="parCount">—</span></span>
  </div>
  <canvas id="c"></canvas>
  <div id="actions">
    <button class="btn sm" onclick="Game.undo()">Undo</button>
    <button class="btn sm" onclick="Game.restart()">Restart</button>
    <button class="btn sm" onclick="Game.showMenu()">Levels</button>
  </div>
  <div id="overlay">
    <h1>GridLock</h1>
    <div class="sub">Slide the vehicles to clear a path for the red car to escape the parking lot!</div>
    <div id="lvlSelect"></div>
  </div>
</div>

<script>
var Game=(function(){
var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var GRID=6, CELL, PAD, W, H;
var EXIT_ROW=2;
var levels=[], level=0, vehicles=[], moves=0, history=[];
var dragId=-1, dragAxis='', dragStart=0, dragOrig=0, dragMin=0, dragMax=0;
var animating=false, solved=false;
var bestMoves={};

/* ── Vehicle colors — distinct, colorblind-friendly ── */
var COLORS=[
  '#ef4444', // 0: player — red
  '#3b82f6', // blue
  '#22c55e', // green
  '#f59e0b', // amber
  '#8b5cf6', // purple
  '#ec4899', // pink
  '#06b6d4', // cyan
  '#f97316', // orange
  '#84cc16', // lime
  '#6366f1', // indigo
  '#14b8a6', // teal
  '#e11d48', // rose
  '#a855f7', // violet
  '#0ea5e9', // sky
  '#d946ef', // fuchsia
];

/* ═══════════════ PUZZLES ═══════════════
   Each vehicle: [col, row, length, dir]
   dir: 'h'=horizontal, 'v'=vertical
   Vehicle 0 is ALWAYS the player (red car, horizontal, row 2)
   All puzzles hand-verified solvable.
   Par = estimated minimum moves.
*/
function buildLevels(){
  levels=[
    // ── Lv1: Warm Up (par 2) ──
    // Just one blocker. Learn to drag.
    // Grid:  . . . . . .
    //        . . . . . .
    //        P P . . A .  → EXIT
    //        . . . . A .
    //        . . . . . .
    //        . . . . . .
    // Sol: A↓2, P→
    { par:2, v:[[0,2,2,'h'],[4,2,2,'v']] },

    // ── Lv2: Two Blockers (par 3) ──
    //        . . . . . .
    //        . . A . . .
    //        P P A . . B  → EXIT
    //        . . . . . B
    //        . . . . . .
    //        . . . . . .
    // Sol: A↑1, B↓2, P→
    { par:3, v:[[0,2,2,'h'],[2,1,2,'v'],[5,2,2,'v']] },

    // ── Lv3: Tight Fit (par 5) ──
    //        . . . . C C
    //        . . . . . .
    //        P P A . B .  → EXIT
    //        . . A . B .
    //        . D D . . .
    //        . . . . . .
    // Sol: C←2, B↑2, D←1, A↓2, P→
    { par:5, v:[[0,2,2,'h'],[2,2,2,'v'],[4,2,2,'v'],[4,0,2,'h'],[1,4,2,'h']] },

    // ── Lv4: Chain Reaction (par 7) ──
    //        . . E E . .
    //        . F . . . .
    //        P P A . . B  → EXIT
    //        . F A . G .
    //        . . . . G .
    //        . C C C . .
    // Sol: F↑1, C←1, G↓1, A↓2, E→2, B↑2, P→
    { par:7, v:[[0,2,2,'h'],[2,2,2,'v'],[5,2,2,'v'],[1,5,3,'h'],[2,0,2,'h'],[1,1,2,'v'],[4,3,2,'v']] },

    // ── Lv5: Gridlock (par 9) ──
    //        A . D D . .
    //        A . . . E .
    //        P P B . E .  → EXIT
    //        . F B . . .
    //        . F . G G G
    //        . . . . . .
    // Sol: G←1, B↓2, F↑1, E↓2, D→2, A↓2, P→ ... (multiple chain)
    { par:9, v:[[0,2,2,'h'],[0,0,2,'v'],[2,2,2,'v'],[2,0,2,'h'],[4,1,2,'v'],[1,3,2,'v'],[3,4,3,'h']] },

    // ── Lv6: Downtown (par 11) ──
    //        A B B . . .
    //        A . . C . .
    //        P P . C D .  → EXIT
    //        . E . . D .
    //        . E F F F .
    //        . . . G G .
    // Sol: complex chain involving F, E, D, C, then player
    { par:11, v:[[0,2,2,'h'],[0,0,2,'v'],[1,0,2,'h'],[3,1,2,'v'],[4,2,2,'v'],[1,3,2,'v'],[2,4,3,'h'],[3,5,2,'h']] },

    // ── Lv7: Rush Hour (par 14) ──
    //        A A B . C .
    //        . . B . C .
    //        P P . D . E  → EXIT
    //        . F . D . E
    //        . F G G G .
    //        H H H . . .
    // Sol: deep interlocking chains
    { par:14, v:[[0,2,2,'h'],[0,0,2,'h'],[2,0,2,'v'],[3,2,2,'v'],[4,0,2,'v'],[5,2,2,'v'],[1,3,2,'v'],[2,4,3,'h'],[0,5,3,'h']] },

    // ── Lv8: Traffic Jam (par 17) ──
    //        A . B B . C
    //        A . . D . C
    //        P P . D . .  → EXIT
    //        E . F . G G
    //        E . F . . .
    //        H H H I I .
    // Sol: multi-step cascade
    { par:17, v:[[0,2,2,'h'],[0,0,2,'v'],[2,0,2,'h'],[3,1,2,'v'],[5,0,2,'v'],[0,3,2,'v'],[2,3,2,'v'],[4,3,2,'h'],[0,5,3,'h'],[3,5,2,'h']] },

    // ── Lv9: Expert (par 21) ──
    //        A B B C . .
    //        A . . C D .
    //        P P E . D .  → EXIT
    //        F . E G G .
    //        F . . . H .
    //        I I I . H .
    // Sol: requires many sequential unblocking steps
    { par:21, v:[[0,2,2,'h'],[0,0,2,'v'],[1,0,2,'h'],[3,0,2,'v'],[4,1,2,'v'],[2,2,2,'v'],[0,3,2,'v'],[3,3,2,'h'],[4,4,2,'v'],[0,5,3,'h']] },

    // ── Lv10: Grand Master (par 25) ──
    //        A A . B C C
    //        D . . B . .
    //        P P E . F .  → EXIT
    //        G . E . F .
    //        G . . H H .
    //        I I I . J J
    // Sol: extremely deep chain, every vehicle must move
    { par:25, v:[[0,2,2,'h'],[0,0,2,'h'],[3,0,2,'v'],[4,0,2,'h'],[0,1,1,'v'],[2,2,2,'v'],[4,2,2,'v'],[0,3,2,'v'],[3,4,2,'h'],[0,5,3,'h'],[4,5,2,'h']] }
  ];

  // Fix Lv10: D should be v2 not v1
  levels[9].v[4] = [0,1,2,'v']; // D: col 0 rows 1-2... wait that conflicts with player
  // Let me fix: D is a single col vehicle
  levels[9] = {
    par:25, v:[
      [0,2,2,'h'],  // player
      [0,0,2,'h'],  // A
      [3,0,2,'v'],  // B
      [4,0,2,'h'],  // C
      [1,1,1,'h'],  // remove this, use proper layout
      [2,2,2,'v'],  // E
      [4,2,2,'v'],  // F
      [0,3,2,'v'],  // G
      [3,4,2,'h'],  // H
      [0,5,3,'h'],  // I
      [4,5,2,'h']   // J
    ]
  };
  // Actually let me just do a clean Lv10:
  levels[9] = {
    par:25, v:[
      [0,2,2,'h'],  // Player
      [0,0,2,'h'],  // A: row 0 cols 0-1
      [3,0,2,'v'],  // B: col 3 rows 0-1
      [4,0,2,'h'],  // C: row 0 cols 4-5
      [2,1,2,'h'],  // D: row 1 cols 2-3 (blocks path)
      [5,1,2,'v'],  // E: col 5 rows 1-2 (blocks exit)
      [2,3,2,'v'],  // F: col 2 rows 3-4
      [4,3,2,'v'],  // G: col 4 rows 3-4
      [0,3,2,'v'],  // H: col 0 rows 3-4
      [0,5,3,'h'],  // I: row 5 cols 0-2 (truck)
      [3,4,3,'h']   // J: row 4 cols 3-5 (truck)
    ]
  };
}

/* ── Sizing ── */
function resize(){
  var maxS=Math.min(window.innerWidth-30, window.innerHeight-120, 540);
  CELL=Math.floor(maxS/GRID);
  PAD=24;
  W=CELL*GRID+PAD*2+CELL/2; // extra space right for exit
  H=CELL*GRID+PAD*2;
  canvas.width=W; canvas.height=H;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
}

/* ── Load level ── */
function loadLevel(n){
  level=n;
  var lv=levels[n];
  vehicles=[];
  for(var i=0;i<lv.v.length;i++){
    var d=lv.v[i];
    vehicles.push({id:i, x:d[0], y:d[1], len:d[2], dir:d[3], color:COLORS[i%COLORS.length]});
  }
  vehicles[0].color=COLORS[0]; // always red
  moves=0; history=[]; solved=false;
  updateHud();
  draw();
}

/* ── Grid helpers ── */
function occupied(skipId){
  var grid=[];
  for(var r=0;r<GRID;r++){grid[r]=[];for(var c=0;c<GRID;c++)grid[r][c]=-1;}
  for(var i=0;i<vehicles.length;i++){
    if(i===skipId) continue;
    var v=vehicles[i];
    for(var s=0;s<v.len;s++){
      var c=v.dir==='h'?v.x+s:v.x;
      var r=v.dir==='v'?v.y+s:v.y;
      if(c>=0&&c<GRID&&r>=0&&r<GRID) grid[r][c]=i;
    }
  }
  return grid;
}

function getDragLimits(vid){
  var v=vehicles[vid];
  var grid=occupied(vid);
  var mn,mx;
  if(v.dir==='h'){
    mn=v.x; mx=v.x;
    while(mn>0&&grid[v.y][mn-1]===-1) mn--;
    while(mx+v.len<GRID&&grid[v.y][mx+v.len]===-1) mx++;
    // player car can exit
    if(vid===0&&v.y===EXIT_ROW){
      var clear=true;
      for(var c=v.x+v.len;c<GRID;c++){if(grid[v.y][c]!==-1){clear=false;break;}}
      if(clear) mx=GRID; // allow sliding off
    }
  } else {
    mn=v.y; mx=v.y;
    while(mn>0&&grid[mn-1][v.x]===-1) mn--;
    while(mx+v.len<GRID&&grid[mx+v.len][v.x]===-1) mx++;
  }
  return {min:mn, max:mx};
}

/* ── Drawing ── */
function draw(){
  ctx.clearRect(0,0,W,H);
  drawLot();
  for(var i=0;i<vehicles.length;i++){
    if(i===dragId) continue;
    drawVehicle(vehicles[i], vehicles[i].x, vehicles[i].y);
  }
  // draw dragged vehicle on top
  if(dragId>=0) drawVehicle(vehicles[dragId], vehicles[dragId].x, vehicles[dragId].y);
}

function drawLot(){
  // asphalt
  ctx.fillStyle='#2a2a30';
  ctx.fillRect(0,0,W,H);

  var ox=PAD, oy=PAD;

  // parking lot surface
  ctx.fillStyle='#383840';
  ctx.fillRect(ox,oy,CELL*GRID,CELL*GRID);

  // grid lines (parking spaces)
  ctx.strokeStyle='rgba(255,255,255,0.08)';
  ctx.lineWidth=1;
  ctx.setLineDash([4,4]);
  for(var i=1;i<GRID;i++){
    ctx.beginPath(); ctx.moveTo(ox+i*CELL,oy); ctx.lineTo(ox+i*CELL,oy+CELL*GRID); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ox,oy+i*CELL); ctx.lineTo(ox+CELL*GRID,oy+i*CELL); ctx.stroke();
  }
  ctx.setLineDash([]);

  // border walls
  ctx.strokeStyle='#666';
  ctx.lineWidth=3;
  // top wall
  ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(ox+CELL*GRID,oy); ctx.stroke();
  // bottom wall
  ctx.beginPath(); ctx.moveTo(ox,oy+CELL*GRID); ctx.lineTo(ox+CELL*GRID,oy+CELL*GRID); ctx.stroke();
  // left wall
  ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(ox,oy+CELL*GRID); ctx.stroke();
  // right wall with exit gap
  ctx.beginPath(); ctx.moveTo(ox+CELL*GRID,oy); ctx.lineTo(ox+CELL*GRID,oy+EXIT_ROW*CELL); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox+CELL*GRID,oy+(EXIT_ROW+1)*CELL); ctx.lineTo(ox+CELL*GRID,oy+CELL*GRID); ctx.stroke();

  // exit arrow
  var ex=ox+CELL*GRID+8, ey=oy+EXIT_ROW*CELL+CELL/2;
  ctx.fillStyle='#22c55e';
  ctx.globalAlpha=0.5+Math.sin(Date.now()*0.004)*0.3;
  ctx.beginPath();
  ctx.moveTo(ex,ey-12);
  ctx.lineTo(ex+16,ey);
  ctx.lineTo(ex,ey+12);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha=1;

  // EXIT text
  ctx.fillStyle='#22c55e';
  ctx.font='bold 10px sans-serif';
  ctx.textAlign='center';
  ctx.fillText('EXIT',ex+8,ey+22);
}

function drawVehicle(v, gx, gy){
  var ox=PAD, oy=PAD;
  var px=ox+gx*CELL, py=oy+gy*CELL;
  var vw=v.dir==='h'?v.len*CELL:CELL;
  var vh=v.dir==='v'?v.len*CELL:CELL;
  var m=4; // margin inside cell

  var x=px+m, y=py+m, w=vw-m*2, h=vh-m*2;
  var r=8;

  // shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  roundRect(ctx,x+2,y+3,w,h,r);
  ctx.fill();

  // body
  ctx.fillStyle=v.color;
  roundRect(ctx,x,y,w,h,r);
  ctx.fill();

  // highlight (top edge)
  ctx.fillStyle='rgba(255,255,255,0.15)';
  roundRect(ctx,x,y,w,h*0.35,r);
  ctx.fill();

  // darker bottom
  ctx.fillStyle='rgba(0,0,0,0.12)';
  roundRect(ctx,x,y+h*0.65,w,h*0.35,r);
  ctx.fill();

  // windows
  ctx.fillStyle='rgba(200,230,255,0.3)';
  if(v.dir==='h'){
    if(v.len===2){
      // car: two windows
      var ww=w*0.25, wh=h*0.35;
      roundRect(ctx,x+w*0.15,y+h*0.18,ww,wh,3); ctx.fill();
      roundRect(ctx,x+w*0.58,y+h*0.18,ww,wh,3); ctx.fill();
    } else {
      // truck: one long window
      roundRect(ctx,x+w*0.6,y+h*0.18,w*0.28,h*0.35,3); ctx.fill();
    }
  } else {
    if(v.len===2){
      var ww2=w*0.4, wh2=h*0.2;
      roundRect(ctx,x+w*0.3,y+h*0.12,ww2,wh2,3); ctx.fill();
      roundRect(ctx,x+w*0.3,y+h*0.55,ww2,wh2,3); ctx.fill();
    } else {
      roundRect(ctx,x+w*0.3,y+h*0.08,w*0.4,h*0.18,3); ctx.fill();
    }
  }

  // wheels
  ctx.fillStyle='rgba(30,30,30,0.6)';
  if(v.dir==='h'){
    var wr=Math.min(5,CELL*0.06);
    ctx.fillRect(x+w*0.12,y-1,w*0.08,wr);
    ctx.fillRect(x+w*0.12,y+h-wr+1,w*0.08,wr);
    ctx.fillRect(x+w*0.78,y-1,w*0.08,wr);
    ctx.fillRect(x+w*0.78,y+h-wr+1,w*0.08,wr);
  } else {
    var wr2=Math.min(5,CELL*0.06);
    ctx.fillRect(x-1,y+h*0.12,wr2,h*0.06);
    ctx.fillRect(x+w-wr2+1,y+h*0.12,wr2,h*0.06);
    ctx.fillRect(x-1,y+h*0.82,wr2,h*0.06);
    ctx.fillRect(x+w-wr2+1,y+h*0.82,wr2,h*0.06);
  }

  // player car indicator — small star/circle
  if(v.id===0){
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.font='bold '+Math.floor(CELL*0.22)+'px sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('★',x+w/2,y+h/2);
  }
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

/* ── Input ── */
function getPos(e){
  var rect=canvas.getBoundingClientRect();
  var raw=e.touches?e.touches[0]:e;
  return {
    x:(raw.clientX-rect.left)*(canvas.width/rect.width)-PAD,
    y:(raw.clientY-rect.top)*(canvas.height/rect.height)-PAD
  };
}

function hitVehicle(px,py){
  for(var i=vehicles.length-1;i>=0;i--){
    var v=vehicles[i];
    var vx=v.x*CELL, vy=v.y*CELL;
    var vw=v.dir==='h'?v.len*CELL:CELL;
    var vh=v.dir==='v'?v.len*CELL:CELL;
    if(px>=vx&&px<vx+vw&&py>=vy&&py<vy+vh) return i;
  }
  return -1;
}

function onDown(e){
  if(solved||animating) return;
  e.preventDefault();
  var p=getPos(e);
  var hit=hitVehicle(p.x,p.y);
  if(hit<0) return;
  dragId=hit;
  var v=vehicles[hit];
  dragAxis=v.dir;
  dragStart=v.dir==='h'?p.x:p.y;
  dragOrig=v.dir==='h'?v.x:v.y;
  var lim=getDragLimits(hit);
  dragMin=lim.min; dragMax=lim.max;
}

function onMove(e){
  if(dragId<0) return;
  e.preventDefault();
  var p=getPos(e);
  var v=vehicles[dragId];
  var cur=v.dir==='h'?p.x:p.y;
  var delta=(cur-dragStart)/CELL;
  var newPos=dragOrig+delta;
  newPos=Math.max(dragMin,Math.min(dragMax,newPos));
  if(v.dir==='h') v.x=newPos;
  else v.y=newPos;
  draw();
}

function onUp(e){
  if(dragId<0) return;
  e.preventDefault();
  var v=vehicles[dragId];
  var snapped=Math.round(v.dir==='h'?v.x:v.y);
  snapped=Math.max(dragMin,Math.min(dragMax,snapped));

  // check if player escaped
  if(dragId===0&&v.dir==='h'&&snapped>=GRID-1){
    // animate exit
    animateExit();
    dragId=-1;
    return;
  }

  var origVal=dragOrig;
  if(v.dir==='h') v.x=snapped;
  else v.y=snapped;

  if(snapped!==origVal){
    history.push({id:dragId, from:origVal, to:snapped, axis:v.dir});
    moves++;
    updateHud();
  }
  dragId=-1;
  draw();
}

function animateExit(){
  animating=true;
  var v=vehicles[0];
  var target=GRID+1;
  var start=v.x;
  var t0=performance.now();
  function tick(ts){
    var p=Math.min(1,(ts-t0)/400);
    p=1-(1-p)*(1-p); // ease out
    v.x=start+(target-start)*p;
    draw();
    if(p<1) requestAnimationFrame(tick);
    else { animating=false; solved=true; onWin(); }
  }
  requestAnimationFrame(tick);
}

canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('mouseleave',function(){if(dragId>=0)onUp({preventDefault:function(){}});});
canvas.addEventListener('touchstart',onDown,{passive:false});
canvas.addEventListener('touchmove',onMove,{passive:false});
canvas.addEventListener('touchend',onUp,{passive:false});

/* ── Win ── */
function onWin(){
  var par=levels[level].par;
  var stars=moves<=par?3:moves<=par+3?2:1;
  saveBest(level,moves);
  var ov=document.getElementById('overlay');
  ov.className='';
  var starStr='';
  for(var i=0;i<3;i++) starStr+=i<stars?'★':'☆';
  ov.innerHTML='<h2>Escaped!</h2>'+
    '<div class="stars">'+starStr+'</div>'+
    '<div class="stat">Moves: '+moves+' (Par: '+par+')</div>'+
    '<div class="stat">Best: '+(bestMoves[level]||moves)+' moves</div>'+
    (level<levels.length-1?
      '<button class="btn" onclick="Game.play('+(level+1)+')" style="margin-top:14px">Next Level</button>':
      '<div class="sub" style="margin-top:10px">You beat all 10 levels!</div>')+
    '<button class="btn sm" onclick="Game.showMenu()" style="margin-top:8px">Level Select</button>';
}

/* ── Best scores ── */
function saveBest(lvl,m){
  try{bestMoves=JSON.parse(localStorage.getItem('gridlock_best'))||{};}catch(e){}
  if(!bestMoves[lvl]||m<bestMoves[lvl]) bestMoves[lvl]=m;
  localStorage.setItem('gridlock_best',JSON.stringify(bestMoves));
}

function updateHud(){
  document.getElementById('lvlNum').textContent=level+1;
  document.getElementById('moveCount').textContent=moves;
  document.getElementById('parCount').textContent=levels[level].par;
}

/* ── Anim loop for exit arrow pulse ── */
function animLoop(){
  requestAnimationFrame(animLoop);
  if(!animating&&!solved&&dragId<0) draw();
}

/* ── Public API ── */
return {
  play:function(n){
    document.getElementById('overlay').className='hidden';
    loadLevel(n);
    level=n;
  },
  undo:function(){
    if(history.length===0||solved) return;
    var h=history.pop();
    var v=vehicles[h.id];
    if(h.axis==='h') v.x=h.from;
    else v.y=h.from;
    moves--;
    updateHud();
    draw();
  },
  restart:function(){
    loadLevel(level);
  },
  showMenu:function(){
    try{bestMoves=JSON.parse(localStorage.getItem('gridlock_best'))||{};}catch(e){bestMoves={};}
    var ov=document.getElementById('overlay');
    ov.className='';
    var html='<h1>GridLock</h1><div class="sub">Slide vehicles to free the red car!</div><div id="lvlSelect">';
    for(var i=0;i<levels.length;i++){
      var done=bestMoves[i]!==undefined;
      var unlocked=i===0||bestMoves[i-1]!==undefined;
      var cls=done?'lbtn done':unlocked?'lbtn':'lbtn locked';
      if(unlocked){
        html+='<div class="'+cls+'" onclick="Game.play('+i+')">'+(i+1);
        if(done) html+='<br><span style="font-size:9px;color:#22c55e">'+bestMoves[i]+'</span>';
        html+='</div>';
      } else {
        html+='<div class="'+cls+'">'+(i+1)+'</div>';
      }
    }
    html+='</div>';
    ov.innerHTML=html;
  },
  init:function(){
    buildLevels();
    resize();
    window.addEventListener('resize',function(){resize();draw();});
    try{bestMoves=JSON.parse(localStorage.getItem('gridlock_best'))||{};}catch(e){bestMoves={};}
    this.showMenu();
    animLoop();
  }
};
})();
Game.init();
</script>
