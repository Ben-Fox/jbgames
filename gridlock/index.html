<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GridLock — BrainSmacks</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#6bb8e0;color:#333;font-family:'Segoe UI',Roboto,'Helvetica Neue',sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none}
#wrap{position:relative;display:flex;flex-direction:column;align-items:center}
#hud{display:flex;gap:20px;align-items:center;margin-bottom:8px;height:36px}
#hud span{font-size:14px;color:#556;font-weight:500}
#hud .val{color:#d9534f;font-weight:800;font-size:16px}
#actions{display:flex;gap:10px;margin-top:10px}
.btn{background:#e85d4a;color:#fff;border:none;padding:8px 20px;border-radius:20px;font-size:13px;cursor:pointer;font-weight:700;transition:all .2s;box-shadow:0 3px 0 #b8392a;letter-spacing:.5px}
.btn:hover{background:#f06b58;transform:translateY(-1px)}
.btn:active{transform:translateY(1px);box-shadow:0 1px 0 #b8392a}
.btn.sm{background:#5b9bd5;box-shadow:0 3px 0 #3a7ab8;padding:7px 16px;font-size:12px}
.btn.sm:hover{background:#6babdf}
canvas{display:block;border-radius:4px;box-shadow:0 6px 24px rgba(0,0,0,.25)}
canvas:active{cursor:grabbing}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:4px;z-index:20;backdrop-filter:blur(4px)}
#overlay.hidden{display:none}
#overlay h1{font-size:44px;color:#e85d4a;margin-bottom:2px;text-shadow:2px 2px 0 rgba(0,0,0,.08);letter-spacing:-1px}
#overlay h2{font-size:24px;color:#e85d4a;margin-bottom:8px}
#overlay .sub{color:#667;font-size:14px;margin-bottom:18px;text-align:center;max-width:340px;line-height:1.6}
#overlay .stars{font-size:36px;margin-bottom:12px;letter-spacing:6px;color:#f5a623}
#overlay .stat{color:#778;font-size:13px;margin-bottom:4px}
#lvlSelect{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:320px;margin-top:14px}
#lvlSelect .lbtn{width:54px;height:54px;background:#fff;border:3px solid #dde;border-radius:12px;color:#e85d4a;font-size:17px;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .2s;line-height:1.2;box-shadow:0 2px 6px rgba(0,0,0,.08)}
#lvlSelect .lbtn:hover{border-color:#e85d4a;transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
#lvlSelect .lbtn.done{border-color:#4caf50;background:#f0fff0}
#lvlSelect .lbtn.locked{opacity:.35;cursor:default}
#lvlSelect .lbtn .best{font-size:9px;color:#4caf50;font-weight:700}
#homeBtn{position:fixed;top:10px;left:10px;z-index:9999;background:rgba(0,0,0,.45);color:#fff;text-decoration:none;padding:6px 12px;border-radius:20px;font-size:14px;font-family:sans-serif;opacity:.7;transition:opacity .2s}
#homeBtn:hover{opacity:1}
.rec-wrap{margin-top:16px;text-align:center}
.rec-wrap h3{font-size:13px;color:#888;margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.rec-cards{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.rec-card{width:140px;border-radius:14px;overflow:hidden;text-decoration:none;color:#fff;transition:transform .25s,box-shadow .25s;cursor:pointer;display:flex;flex-direction:column}
.rec-card:hover{transform:translateY(-4px) scale(1.03)}
.rec-card .rc-thumb{height:70px;display:flex;align-items:center;justify-content:center;font-size:28px}
.rec-card .rc-body{padding:8px 10px;background:rgba(0,0,0,.15)}
.rec-card .rc-title{font-size:13px;font-weight:700;margin-bottom:2px}
.rec-card .rc-desc{font-size:10px;opacity:.75;line-height:1.3}
</style>
</head>
<body>
<a href="../" id="homeBtn"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Home</a>
<div id="wrap">
  <div id="hud">
    <span>Level <span class="val" id="lvlNum">1</span></span>
    <span>Moves: <span class="val" id="moveCount">0</span></span>
    <span>Par: <span class="val" id="parCount">—</span></span>
  </div>
  <canvas id="c"></canvas>
  <div id="actions">
    <button class="btn sm" onclick="Game.undo()">Undo</button>
    <button class="btn sm" onclick="Game.restart()">Restart</button>
    <button class="btn sm" onclick="Game.showMenu()">Levels</button>
  </div>
  <div id="overlay">
    <h1>GridLock</h1>
    <div class="sub">Slide the vehicles to clear a path for the red car to escape!</div>
    <div id="lvlSelect"></div>
  </div>
</div>

<script>
var Game=(function(){
var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var GRID=6,CELL,PAD_TOP,PAD_SIDE,ROAD_H,W,H,EXIT_ROW=2;
var levels=[],level=0,vehicles=[],moves=0,history=[];
var dragId=-1,dragStart=0,dragOrig=0,dragMin=0,dragMax=0;
var animating=false,solved=false,bestMoves={};

/* ═══ AMBIENT TRAFFIC ═══ */
var ambientCars=[];
var AMB_COLORS=['#1565c0','#2e7d32','#f57f17','#6a1b9a','#c62828','#00838f','#e65100','#ad1457','#283593','#4e342e'];
var ambientTimer=0;
function spawnAmbient(){
  // Don't spawn if any car is still in the left third (prevent overlap)
  for(var i=0;i<ambientCars.length;i++){
    if(ambientCars[i].x+ambientCars[i].len*CELL>W*0.15)return;
  }
  var spd=1.5+Math.random()*1.0;
  ambientCars.push({
    x:-CELL*2.5,
    speed:spd,
    color:AMB_COLORS[Math.floor(Math.random()*AMB_COLORS.length)],
    len:Math.random()<0.2?3:2
  });
  ambientTimer=0;
}
function updateAmbient(){
  for(var i=ambientCars.length-1;i>=0;i--){
    ambientCars[i].x+=ambientCars[i].speed;
    if(ambientCars[i].x>W+CELL*3)ambientCars.splice(i,1);
  }
  ambientTimer++;
  // Only try to spawn every ~8 seconds (480 frames at 60fps), max 1 on screen
  if(ambientCars.length===0&&ambientTimer>480&&Math.random()<0.02)spawnAmbient();
}

var COLORS=[
  '#e53935','#1e88e5','#43a047','#fb8c00','#8e24aa',
  '#d81b60','#00acc1','#f4511e','#7cb342','#5c6bc0',
  '#00897b','#c62828','#ab47bc','#039be5','#e040fb'
];

function buildLevels(){
  levels=[
    {par:2, v:[[0,2,2,'h'],[3,0,3,'v']]},
    {par:4, v:[[0,2,2,'h'],[5,2,2,'v'],[4,2,2,'v'],[3,2,2,'v']]},
    {par:7, v:[[1,2,2,'h'],[0,1,2,'v'],[1,0,3,'h'],[3,4,2,'h'],[4,1,2,'v'],[2,3,2,'v'],[4,0,2,'h']]},
    {par:10, v:[[1,2,2,'h'],[4,1,3,'v'],[2,3,2,'v'],[3,4,3,'h'],[0,1,2,'v'],[3,5,2,'h'],[1,1,3,'h'],[1,5,2,'h']]},
    {par:14, v:[[0,2,2,'h'],[2,0,2,'h'],[2,4,2,'v'],[3,2,2,'v'],[1,0,2,'v'],[2,1,2,'v'],[1,3,2,'h'],[4,1,2,'v'],[3,4,3,'h']]},
    {par:20, v:[[0,2,2,'h'],[0,0,2,'h'],[0,4,2,'v'],[2,3,2,'v'],[4,2,2,'v'],[0,1,3,'h'],[1,4,2,'v'],[4,0,2,'v'],[3,4,2,'h'],[5,1,2,'v']]},
    {par:24, v:[[0,2,2,'h'],[4,4,2,'h'],[3,5,3,'h'],[4,1,2,'h'],[0,5,2,'h'],[3,1,2,'v'],[3,3,2,'v'],[2,0,3,'h'],[2,2,2,'v'],[4,2,2,'v'],[0,0,2,'v']]},
    {par:29, v:[[1,2,2,'h'],[1,3,2,'h'],[5,1,2,'v'],[4,0,2,'h'],[2,0,2,'v'],[3,4,2,'v'],[0,4,3,'h'],[4,3,3,'v'],[3,2,2,'v'],[5,4,2,'v'],[0,2,2,'v'],[1,5,2,'h']]}
  ];
}

function resize(){
  var maxS=Math.min(window.innerWidth-20,window.innerHeight-140,500);
  CELL=Math.floor(maxS/GRID);
  PAD_TOP=20;PAD_SIDE=20;ROAD_H=CELL+8;
  var exitW=Math.floor(CELL*0.7);
  W=PAD_SIDE*2+CELL*GRID+exitW;
  H=PAD_TOP+CELL*GRID+12+ROAD_H+10;
  canvas.width=W;canvas.height=H;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
}

function loadLevel(n){
  level=n;var lv=levels[n];vehicles=[];
  for(var i=0;i<lv.v.length;i++){
    var d=lv.v[i];
    vehicles.push({id:i,x:d[0],y:d[1],len:d[2],dir:d[3],color:COLORS[i%COLORS.length]});
  }
  vehicles[0].color=COLORS[0];
  moves=0;history=[];solved=false;ambientCars=[];
  updateHud();draw();
}

function occupied(skipId){
  var g=[];for(var r=0;r<GRID;r++){g[r]=[];for(var c=0;c<GRID;c++)g[r][c]=-1;}
  for(var i=0;i<vehicles.length;i++){
    if(i===skipId)continue;var v=vehicles[i];
    for(var s=0;s<v.len;s++){
      var c=v.dir==='h'?v.x+s:v.x,r=v.dir==='v'?v.y+s:v.y;
      if(c>=0&&c<GRID&&r>=0&&r<GRID)g[r][c]=i;
    }
  }return g;
}

function getDragLimits(vid){
  var v=vehicles[vid],g=occupied(vid),mn,mx;
  if(v.dir==='h'){
    mn=v.x;mx=v.x;
    while(mn>0&&g[v.y][mn-1]===-1)mn--;
    while(mx+v.len<GRID&&g[v.y][mx+v.len]===-1)mx++;
    if(vid===0&&v.y===EXIT_ROW){
      var clear=true;
      for(var c=v.x+v.len;c<GRID;c++)if(g[v.y][c]!==-1){clear=false;break;}
      if(clear)mx=GRID;
    }
  }else{
    mn=v.y;mx=v.y;
    while(mn>0&&g[mn-1][v.x]===-1)mn--;
    while(mx+v.len<GRID&&g[mx+v.len][v.x]===-1)mx++;
  }
  return{min:mn,max:mx};
}

/* ════════ DRAWING ════════ */
function draw(){
  ctx.clearRect(0,0,W,H);
  drawScene();
  var ox=PAD_SIDE,oy=PAD_TOP;
  for(var i=0;i<vehicles.length;i++){if(i===dragId)continue;drawVehicle(vehicles[i],ox,oy);}
  if(dragId>=0)drawVehicle(vehicles[dragId],ox,oy);
}

function drawScene(){
  var ox=PAD_SIDE,oy=PAD_TOP,gw=CELL*GRID,gh=CELL*GRID;
  var exitW=Math.floor(CELL*0.7);

  // ── SKY ──
  var sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#7ec8e3');sky.addColorStop(0.6,'#a8ddf0');sky.addColorStop(1,'#c4eaf5');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // Clouds
  drawCloud(W*0.12,18,28);drawCloud(W*0.55,8,22);drawCloud(W*0.82,24,18);

  // ── GRASS AREA (behind lot and around) ──
  ctx.fillStyle='#5daa3a';
  ctx.fillRect(0,oy-10,W,gh+22+12);
  // Grass highlights
  ctx.fillStyle='#6abf4b';
  for(var i=0;i<16;i++){
    ctx.fillRect(Math.random()*W,oy-8+Math.random()*(gh+28),Math.random()*30+10,3);
  }

  // ── SIDEWALKS on all sides ──
  var sw=12;
  ctx.fillStyle='#cdc8bc';
  // top sidewalk
  ctx.fillRect(ox-sw,oy-sw,gw+sw*2+exitW,sw);
  // bottom sidewalk
  ctx.fillRect(ox-sw,oy+gh,gw+sw*2+exitW,sw);
  // left sidewalk
  ctx.fillRect(ox-sw,oy,sw,gh);
  // right sidewalk (with gap for exit driveway connecting to road)
  ctx.fillRect(ox+gw,oy,exitW+sw,EXIT_ROW*CELL);
  ctx.fillRect(ox+gw,oy+(EXIT_ROW+1)*CELL,exitW+sw,gh-(EXIT_ROW+1)*CELL);
  // sidewalk cracks
  ctx.strokeStyle='#b5b0a3';ctx.lineWidth=1;
  // horizontal cracks on top/bottom
  for(var i=0;i<Math.ceil((gw+sw*2+exitW)/40);i++){
    var cx2=ox-sw+i*40;
    ctx.beginPath();ctx.moveTo(cx2,oy-sw);ctx.lineTo(cx2,oy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx2,oy+gh);ctx.lineTo(cx2,oy+gh+sw);ctx.stroke();
  }
  // vertical cracks on left
  for(var i=0;i<Math.ceil(gh/40);i++){
    var cy2=oy+i*40;
    ctx.beginPath();ctx.moveTo(ox-sw,cy2);ctx.lineTo(ox,cy2);ctx.stroke();
  }

  // ── PARKING LOT SURFACE ──
  var asp=ctx.createLinearGradient(ox,oy,ox,oy+gh);
  asp.addColorStop(0,'#9e9e9e');asp.addColorStop(0.5,'#929292');asp.addColorStop(1,'#888');
  ctx.fillStyle=asp;ctx.fillRect(ox,oy,gw,gh);

  // Asphalt speckle
  ctx.fillStyle='rgba(0,0,0,0.04)';
  for(var i=0;i<60;i++)ctx.fillRect(ox+Math.random()*gw,oy+Math.random()*gh,2,2);
  ctx.fillStyle='rgba(255,255,255,0.03)';
  for(var i=0;i<40;i++)ctx.fillRect(ox+Math.random()*gw,oy+Math.random()*gh,2,2);

  // ── PARKING LINES (white) ──
  ctx.strokeStyle='rgba(255,255,255,0.75)';ctx.lineWidth=2;
  for(var i=1;i<GRID;i++){
    ctx.beginPath();ctx.moveTo(ox+i*CELL,oy);ctx.lineTo(ox+i*CELL,oy+gh);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ox,oy+i*CELL);ctx.lineTo(ox+gw,oy+i*CELL);ctx.stroke();
  }

  // ── LOT WALLS ──
  ctx.strokeStyle='#555';ctx.lineWidth=4;ctx.lineJoin='round';
  // top
  ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+gw,oy);ctx.stroke();
  // bottom
  ctx.beginPath();ctx.moveTo(ox,oy+gh);ctx.lineTo(ox+gw,oy+gh);ctx.stroke();
  // left
  ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox,oy+gh);ctx.stroke();
  // right with exit gap
  ctx.beginPath();ctx.moveTo(ox+gw,oy);ctx.lineTo(ox+gw,oy+EXIT_ROW*CELL);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ox+gw,oy+(EXIT_ROW+1)*CELL);ctx.lineTo(ox+gw,oy+gh);ctx.stroke();

  // ── RED/WHITE CURBS (left wall) ──
  var curbW=6;
  ctx.save();
  for(var i=0;i<Math.ceil(gh/10);i++){
    ctx.fillStyle=i%2===0?'#d32f2f':'#fff';
    ctx.fillRect(ox-curbW,oy+i*10,curbW,10);
  }
  ctx.restore();

  // ── EXIT DRIVEWAY ──
  var ex=ox+gw,ey=oy+EXIT_ROW*CELL;
  ctx.fillStyle='#888';
  ctx.fillRect(ex,ey,exitW,CELL);
  // dashed center line
  ctx.strokeStyle='#f5d442';ctx.lineWidth=2;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(ex,ey+CELL/2);ctx.lineTo(ex+exitW,ey+CELL/2);ctx.stroke();
  ctx.setLineDash([]);

  // EXIT sign
  var sx=ex+2,sy=ey-22;
  ctx.fillStyle='#777';ctx.fillRect(sx+14,sy+16,3,24);
  ctx.fillStyle='#1b5e20';
  roundRect(ctx,sx,sy,34,17,3);ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=1;
  roundRect(ctx,sx+2,sy+2,30,13,2);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('EXIT',sx+17,sy+9);

  // Pulsing arrow
  var pulse=0.4+Math.sin(Date.now()*0.004)*0.4;
  ctx.fillStyle='rgba(76,175,80,'+pulse+')';
  var ax=ex+exitW*0.4,ay=ey+CELL*0.7;
  ctx.beginPath();ctx.moveTo(ax-6,ay-10);ctx.lineTo(ax+10,ay);ctx.lineTo(ax-6,ay+10);ctx.closePath();ctx.fill();

  // ── BOLLARDS at lot entrance ──
  drawBollard(ex+1,ey-2);
  drawBollard(ex+1,ey+CELL);

  // ── TRAFFIC CONES ──
  drawCone(ox+6,oy+gh-2);
  drawCone(ox+gw-10,oy+gh-2);

  // P sign (parking)
  ctx.fillStyle='#1565c0';
  ctx.beginPath();ctx.arc(ox+gw/2,oy-2,11,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('P',ox+gw/2,oy-1);

  // ── ROAD (bottom, single lane, same scale as puzzle) ──
  var roadY=oy+gh+12;
  // Road surface
  ctx.fillStyle='#555';
  ctx.fillRect(0,roadY,W,ROAD_H);
  // Road edge lines (white)
  ctx.fillStyle='#fff';
  ctx.fillRect(0,roadY,W,3);
  ctx.fillRect(0,roadY+ROAD_H-3,W,3);

  // ── AMBIENT CARS on road (same scale as puzzle cars) ──
  for(var i=0;i<ambientCars.length;i++){
    var ac=ambientCars[i];
    var cy=roadY+ROAD_H/2;
    drawAmbientCar(ac.x,cy,ac.color,ac.len);
  }

  // ── GREEN STRIP below road ──
  ctx.fillStyle='#5daa3a';
  ctx.fillRect(0,roadY+ROAD_H,W,20);
  ctx.fillStyle='#6abf4b';
  for(var i=0;i<8;i++)ctx.fillRect(Math.random()*W,roadY+ROAD_H+Math.random()*10,20,2);
}

function drawCloud(cx,cy,size){
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.arc(cx,cy,size*0.5,0,Math.PI*2);
  ctx.arc(cx-size*0.4,cy+size*0.1,size*0.35,0,Math.PI*2);
  ctx.arc(cx+size*0.45,cy+size*0.08,size*0.38,0,Math.PI*2);
  ctx.fill();
}

function drawBollard(bx,by){
  ctx.fillStyle='#fdd835';
  roundRect(ctx,bx,by-8,6,8,2);ctx.fill();
  ctx.strokeStyle='#333';ctx.lineWidth=1;
  roundRect(ctx,bx,by-8,6,8,2);ctx.stroke();
}

function drawCone(cx,cy){
  ctx.fillStyle='#ff7043';
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+8,cy);ctx.lineTo(cx+4,cy-12);ctx.closePath();ctx.fill();
  ctx.fillStyle='#fff';ctx.fillRect(cx+1,cy-6,6,2);
  ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+8,cy);ctx.lineTo(cx+4,cy-12);ctx.closePath();ctx.stroke();
}

function drawAmbientCar(ax,ay,color,cellLen){
  // Draw using same style as puzzle vehicles, horizontal, CELL-scaled
  var m=4,r=8;
  var w=cellLen*CELL-m*2,h=CELL-m*2;
  var x=ax+m,y=ay-CELL/2+m;

  ctx.fillStyle='rgba(0,0,0,0.2)';
  roundRect(ctx,x+2,y+3,w,h,r);ctx.fill();
  ctx.fillStyle=color;
  roundRect(ctx,x,y,w,h,r);ctx.fill();
  var shade=ctx.createLinearGradient(x,y,x,y+h);
  shade.addColorStop(0,'rgba(255,255,255,0.35)');shade.addColorStop(0.35,'rgba(255,255,255,0.1)');
  shade.addColorStop(0.65,'rgba(0,0,0,0)');shade.addColorStop(1,'rgba(0,0,0,0.15)');
  ctx.fillStyle=shade;roundRect(ctx,x,y,w,h,r);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.lineWidth=2;
  roundRect(ctx,x,y,w,h,r);ctx.stroke();
  // window
  ctx.fillStyle='rgba(135,206,235,0.65)';ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1.5;
  var cabX=x+w*0.25,cabW=w*0.5,cabY=y+3,cabH=h-6;
  roundRect(ctx,cabX,cabY,cabW,cabH,5);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(cabX+cabW/2,cabY);ctx.lineTo(cabX+cabW/2,cabY+cabH);ctx.stroke();
  // headlights
  ctx.fillStyle='#fff9c4';ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(x+w-7,y+8,3.5,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.arc(x+w-7,y+h-8,3.5,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='#ff5252';
  ctx.beginPath();ctx.arc(x+7,y+8,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+7,y+h-8,3,0,Math.PI*2);ctx.fill();
  // wheels
  ctx.fillStyle='#333';
  var wh2=Math.min(7,CELL*0.09),woff3=w*0.18;
  roundRect(ctx,x+woff3-2,y-2,9,wh2,2);ctx.fill();
  roundRect(ctx,x+woff3-2,y+h-wh2+2,9,wh2,2);ctx.fill();
  roundRect(ctx,x+w-woff3-7,y-2,9,wh2,2);ctx.fill();
  roundRect(ctx,x+w-woff3-7,y+h-wh2+2,9,wh2,2);ctx.fill();
}

function drawVehicle(v,ox,oy){
  var px=ox+v.x*CELL,py=oy+v.y*CELL;
  var vw=v.dir==='h'?v.len*CELL:CELL;
  var vh=v.dir==='v'?v.len*CELL:CELL;
  var m=4,r=8;
  var x=px+m,y=py+m,w=vw-m*2,h=vh-m*2;

  // Drop shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  roundRect(ctx,x+2,y+3,w,h,r);ctx.fill();

  // Car body
  ctx.fillStyle=v.color;
  roundRect(ctx,x,y,w,h,r);ctx.fill();

  // Cartoon shading
  var shade=ctx.createLinearGradient(x,y,x,y+h);
  shade.addColorStop(0,'rgba(255,255,255,0.35)');
  shade.addColorStop(0.35,'rgba(255,255,255,0.1)');
  shade.addColorStop(0.65,'rgba(0,0,0,0)');
  shade.addColorStop(1,'rgba(0,0,0,0.15)');
  ctx.fillStyle=shade;
  roundRect(ctx,x,y,w,h,r);ctx.fill();

  // Outline
  ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.lineWidth=2;
  roundRect(ctx,x,y,w,h,r);ctx.stroke();

  // Windows
  ctx.fillStyle='rgba(135,206,235,0.65)';
  ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1.5;
  if(v.dir==='h'){
    var cabX=x+w*0.25,cabW=w*0.5,cabY=y+3,cabH=h-6;
    roundRect(ctx,cabX,cabY,cabW,cabH,5);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(cabX+cabW/2,cabY);ctx.lineTo(cabX+cabW/2,cabY+cabH);ctx.stroke();
  }else{
    var cabY2=y+h*0.25,cabH2=h*0.5,cabX2=x+3,cabW2=w-6;
    roundRect(ctx,cabX2,cabY2,cabW2,cabH2,5);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(cabX2,cabY2+cabH2/2);ctx.lineTo(cabX2+cabW2,cabY2+cabH2/2);ctx.stroke();
  }

  // Headlights
  ctx.fillStyle='#fff9c4';ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=1;
  if(v.dir==='h'){
    ctx.beginPath();ctx.arc(x+w-7,y+8,3.5,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.arc(x+w-7,y+h-8,3.5,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle='#ff5252';
    ctx.beginPath();ctx.arc(x+7,y+8,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+7,y+h-8,3,0,Math.PI*2);ctx.fill();
  }else{
    ctx.beginPath();ctx.arc(x+8,y+h-7,3.5,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.arc(x+w-8,y+h-7,3.5,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle='#ff5252';
    ctx.beginPath();ctx.arc(x+8,y+7,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+w-8,y+7,3,0,Math.PI*2);ctx.fill();
  }

  // Wheels
  ctx.fillStyle='#333';
  if(v.dir==='h'){
    var wh=Math.min(7,CELL*0.09),woff=w*0.18;
    roundRect(ctx,x+woff-2,y-2,9,wh,2);ctx.fill();
    roundRect(ctx,x+woff-2,y+h-wh+2,9,wh,2);ctx.fill();
    roundRect(ctx,x+w-woff-7,y-2,9,wh,2);ctx.fill();
    roundRect(ctx,x+w-woff-7,y+h-wh+2,9,wh,2);ctx.fill();
  }else{
    var wr2=Math.min(7,CELL*0.09),woff2=h*0.18;
    roundRect(ctx,x-2,y+woff2-2,wr2,9,2);ctx.fill();
    roundRect(ctx,x+w-wr2+2,y+woff2-2,wr2,9,2);ctx.fill();
    roundRect(ctx,x-2,y+h-woff2-7,wr2,9,2);ctx.fill();
    roundRect(ctx,x+w-wr2+2,y+h-woff2-7,wr2,9,2);ctx.fill();
  }

  // Player star
  if(v.id===0){
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.font='bold '+Math.floor(CELL*0.22)+'px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('★',x+w/2,y+h/2);
  }

  // Truck cargo lines
  if(v.len===3){
    ctx.strokeStyle='rgba(0,0,0,0.08)';ctx.lineWidth=1;
    if(v.dir==='h'){
      for(var i=1;i<=3;i++){ctx.beginPath();ctx.moveTo(x+w*0.06,y+h*(i*0.2+0.1));ctx.lineTo(x+w*0.18,y+h*(i*0.2+0.1));ctx.stroke();}
    }else{
      for(var i=1;i<=3;i++){ctx.beginPath();ctx.moveTo(x+w*(i*0.2+0.1),y+h*0.06);ctx.lineTo(x+w*(i*0.2+0.1),y+h*0.18);ctx.stroke();}
    }
  }
}

function roundRect(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();
}

/* ════════ INPUT ════════ */
function getPos(e){
  var rect=canvas.getBoundingClientRect();
  var raw=e.touches?e.touches[0]:e;
  return{x:(raw.clientX-rect.left)*(canvas.width/rect.width)-PAD_SIDE,
         y:(raw.clientY-rect.top)*(canvas.height/rect.height)-PAD_TOP};
}
function hitVehicle(px,py){
  for(var i=vehicles.length-1;i>=0;i--){
    var v=vehicles[i],vx=v.x*CELL,vy=v.y*CELL;
    var vw=v.dir==='h'?v.len*CELL:CELL,vh=v.dir==='v'?v.len*CELL:CELL;
    if(px>=vx&&px<vx+vw&&py>=vy&&py<vy+vh)return i;
  }return-1;
}
function onDown(e){
  if(solved||animating)return;e.preventDefault();
  var p=getPos(e),hit=hitVehicle(p.x,p.y);
  if(hit<0)return;
  dragId=hit;var v=vehicles[hit];
  dragStart=v.dir==='h'?p.x:p.y;
  dragOrig=v.dir==='h'?v.x:v.y;
  var lim=getDragLimits(hit);dragMin=lim.min;dragMax=lim.max;
}
function onMove(e){
  if(dragId<0)return;e.preventDefault();
  var p=getPos(e),v=vehicles[dragId];
  var cur=v.dir==='h'?p.x:p.y;
  var delta=(cur-dragStart)/CELL;
  var newPos=dragOrig+delta;
  newPos=Math.max(dragMin,Math.min(dragMax,newPos));
  if(v.dir==='h')v.x=newPos;else v.y=newPos;
  draw();
}
function onUp(e){
  if(dragId<0)return;e.preventDefault();
  var v=vehicles[dragId];
  var snapped=Math.round(v.dir==='h'?v.x:v.y);
  snapped=Math.max(dragMin,Math.min(dragMax,snapped));
  if(dragId===0&&v.dir==='h'&&snapped>=GRID-1){animateExit();dragId=-1;return;}
  var origVal=dragOrig;
  if(v.dir==='h')v.x=snapped;else v.y=snapped;
  if(snapped!==origVal){history.push({id:dragId,from:origVal,to:snapped});moves++;updateHud();}
  dragId=-1;draw();
}
function animateExit(){
  animating=true;var v=vehicles[0],start=v.x,target=GRID+1,t0=performance.now();
  function tick(ts){var p=Math.min(1,(ts-t0)/400);p=1-(1-p)*(1-p);v.x=start+(target-start)*p;draw();
    if(p<1)requestAnimationFrame(tick);else{animating=false;solved=true;onWin();}}
  requestAnimationFrame(tick);
}
canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('mouseleave',function(){if(dragId>=0)onUp({preventDefault:function(){}});});
canvas.addEventListener('touchstart',onDown,{passive:false});
canvas.addEventListener('touchmove',onMove,{passive:false});
canvas.addEventListener('touchend',onUp,{passive:false});

/* ════════ WIN / SCORES ════════ */
function onWin(){
  var par=levels[level].par;
  var stars=moves<=par?3:moves<=par+3?2:1;
  saveBest(level,moves);
  var ov=document.getElementById('overlay');ov.className='';
  var ss='';for(var i=0;i<3;i++)ss+=i<stars?'★':'☆';
  ov.innerHTML='<h2>Escaped!</h2><div class="stars">'+ss+'</div>'+
    '<div class="stat">Moves: '+moves+' (Par: '+par+')</div>'+
    '<div class="stat">Best: '+(bestMoves[level]||moves)+' moves</div>'+
    (level<levels.length-1?'<button class="btn" onclick="Game.play('+(level+1)+')" style="margin-top:14px">Next Level</button>':
    '<div class="sub" style="margin-top:6px">You beat every level!</div>'+recHTML())+
    '<button class="btn sm" onclick="Game.showMenu()" style="margin-top:8px">Level Select</button>';
}
function recHTML(){
  return '<div class="rec-wrap"><h3>Play Next</h3><div class="rec-cards">'+
    '<a href="../circle/" class="rec-card" style="background:linear-gradient(160deg,#1e293b,#334155)">'+
      '<div class="rc-thumb">◎</div><div class="rc-body"><div class="rc-title" style="color:#e2e8f0">Circle</div><div class="rc-desc">Draw a perfect circle freehand</div></div></a>'+
    '<a href="../breakpoint/" class="rec-card" style="background:linear-gradient(160deg,#1a0a0a,#0a1a0e)">'+
      '<div class="rc-thumb">🃏</div><div class="rc-body"><div class="rc-title" style="background:linear-gradient(90deg,#ef4444,#22c55e);-webkit-background-clip:text;-webkit-text-fill-color:transparent">BreakPoint</div><div class="rc-desc">Tactical card duel</div></div></a>'+
    '<a href="../likelihood/" class="rec-card" style="background:linear-gradient(160deg,#1a0a2e,#2e1065)">'+
      '<div class="rc-thumb" style="color:#c4b5fd">%</div><div class="rc-body"><div class="rc-title" style="color:#c4b5fd">Likelihood</div><div class="rc-desc">Guess the probability</div></div></a>'+
    '</div></div>';
}
function saveBest(lvl,m){
  try{bestMoves=JSON.parse(localStorage.getItem('gridlock_best'))||{};}catch(e){}
  if(!bestMoves[lvl]||m<bestMoves[lvl])bestMoves[lvl]=m;
  localStorage.setItem('gridlock_best',JSON.stringify(bestMoves));
}
function updateHud(){
  document.getElementById('lvlNum').textContent=level+1;
  document.getElementById('moveCount').textContent=moves;
  document.getElementById('parCount').textContent=levels[level].par;
}
function animLoop(){
  updateAmbient();
  draw();
  requestAnimationFrame(animLoop);
}

/* ════════ PUBLIC API ════════ */
return{
  play:function(n){document.getElementById('overlay').className='hidden';loadLevel(n);},
  undo:function(){
    if(!history.length||solved)return;
    var h=history.pop(),v=vehicles[h.id];
    if(v.dir==='h')v.x=h.from;else v.y=h.from;
    moves--;updateHud();draw();
  },
  restart:function(){loadLevel(level);},
  showMenu:function(){
    try{bestMoves=JSON.parse(localStorage.getItem('gridlock_best'))||{};}catch(e){bestMoves={};}
    var ov=document.getElementById('overlay');ov.className='';
    var html='<h1>GridLock</h1><div class="sub">Slide vehicles to free the red car!<br>Drag cars and trucks along their lane.</div><div id="lvlSelect">';
    for(var i=0;i<levels.length;i++){
      var done=bestMoves[i]!==undefined;
      var unlocked=i===0||bestMoves[i-1]!==undefined;
      var cls=done?'lbtn done':unlocked?'lbtn':'lbtn locked';
      if(unlocked){
        html+='<div class="'+cls+'" onclick="Game.play('+i+')">'+(i+1);
        if(done)html+='<span class="best">'+bestMoves[i]+'</span>';
        html+='</div>';
      }else html+='<div class="'+cls+'">'+(i+1)+'</div>';
    }
    html+='</div>';ov.innerHTML=html;
  },
  init:function(){
    buildLevels();resize();
    window.addEventListener('resize',function(){resize();draw();});
    try{bestMoves=JSON.parse(localStorage.getItem('gridlock_best'))||{};}catch(e){bestMoves={};}
    this.showMenu();animLoop();
  }
};
})();
Game.init();
</script>
