<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>React — BrainSmacks</title>
<meta name="description" content="Click at exactly 10.000 seconds. Pure reaction precision — the timer shows thousandths and your delta earns a badge.">
<link rel="canonical" href="https://brainsmacks.com/react/">
<meta property="og:title" content="React — BrainSmacks">
<meta property="og:description" content="Click at exactly 10.000 seconds. Pure reaction precision.">
<meta property="og:url" content="https://brainsmacks.com/react/">
<meta property="og:type" content="website">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:radial-gradient(ellipse at 50% 30%,#0a2530 0%,#06141a 70%);color:#e8f7fa;font-family:'Segoe UI',Roboto,sans-serif;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;cursor:pointer;text-align:center;padding:20px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
#catcher{position:fixed;inset:0;z-index:50;display:none;background:transparent;cursor:pointer}
#catcher.active{display:block}
#title{font-size:30px;font-weight:800;color:#22d3ee;letter-spacing:10px;text-transform:uppercase;text-shadow:0 0 24px rgba(34,211,238,.4);margin-bottom:8px}
#target{font-size:13px;color:#475569;letter-spacing:3px;text-transform:uppercase;margin-bottom:24px}
#timer{font-family:'Courier New','Menlo',monospace;font-size:120px;font-weight:700;color:#475569;letter-spacing:6px;line-height:1;font-variant-numeric:tabular-nums;transition:color .15s,text-shadow .15s}
#timer.running{color:#22d3ee;text-shadow:0 0 40px rgba(34,211,238,.4)}
#timer.bullseye{color:#fbbf24;text-shadow:0 0 50px rgba(251,191,36,.7)}
#timer.miss{color:#94a3b8;text-shadow:none}
#hint{font-size:15px;color:#64748b;min-height:24px;margin-top:18px;letter-spacing:.5px}
#startBtn{background:linear-gradient(135deg,#0891b2,#22d3ee);color:#06141a;border:none;padding:14px 48px;border-radius:30px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #155e75,0 0 30px rgba(34,211,238,.25);transition:transform .15s,box-shadow .15s;letter-spacing:2px;text-transform:uppercase;margin-top:20px}
#startBtn:hover{transform:translateY(-2px);box-shadow:0 6px 0 #155e75,0 0 40px rgba(34,211,238,.4)}
#startBtn:active{transform:translateY(2px);box-shadow:0 2px 0 #155e75}
#startBtn.hidden{display:none}
#result{display:none;flex-direction:column;align-items:center;gap:8px;margin-top:18px}
#result.shown{display:flex}
.badge{font-size:38px;font-weight:800;letter-spacing:4px;text-transform:uppercase;padding:10px 28px;border-radius:14px;border:2px solid;animation:badgePop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes badgePop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}
.badge.react{color:#fbbf24;border-color:#fbbf24;background:rgba(251,191,36,.1);text-shadow:0 0 20px rgba(251,191,36,.8);animation:badgePop .35s cubic-bezier(.34,1.56,.64,1),reactGlow 1.4s ease-in-out infinite .35s}
@keyframes reactGlow{0%,100%{box-shadow:0 0 20px rgba(251,191,36,.4),inset 0 0 20px rgba(251,191,36,.1)}50%{box-shadow:0 0 40px rgba(251,191,36,.7),inset 0 0 30px rgba(251,191,36,.2)}}
.badge.laser{color:#a5f3fc;border-color:#22d3ee;background:rgba(34,211,238,.12);text-shadow:0 0 18px rgba(34,211,238,.7)}
.badge.sniper{color:#22d3ee;border-color:rgba(34,211,238,.7);background:rgba(34,211,238,.06)}
.badge.sharp{color:#67e8f9;border-color:rgba(34,211,238,.45);background:rgba(34,211,238,.04)}
.badge.steady{color:#94a3b8;border-color:rgba(148,163,184,.4);background:rgba(148,163,184,.05)}
.badge.slow{color:#64748b;border-color:rgba(100,116,139,.4);background:rgba(100,116,139,.05)}
.badge.whiff{color:#475569;border-color:rgba(71,85,105,.45);background:rgba(71,85,105,.05)}
#delta{font-family:'Courier New',monospace;font-size:22px;color:#cbd5e1;letter-spacing:1px;margin-top:6px}
#best{font-size:13px;color:#64748b;letter-spacing:1.5px;margin-top:6px;text-transform:uppercase}
#homeBtn{position:fixed;top:14px;left:14px;z-index:9999;background:rgba(0,0,0,.4);color:#22d3ee;text-decoration:none;padding:6px 14px;border-radius:20px;font-size:13px;font-family:sans-serif;opacity:.7;transition:opacity .2s;pointer-events:auto}
#homeBtn:hover{opacity:1}
#tiers{font-size:11px;color:#475569;letter-spacing:2px;margin-top:14px;text-transform:uppercase;line-height:1.7}
#tiers .t{display:inline-block;padding:0 8px;border-right:1px solid rgba(71,85,105,.5)}
#tiers .t:last-child{border-right:none}
@media (max-width:600px){
  #timer{font-size:72px;letter-spacing:4px}
  #title{font-size:22px;letter-spacing:6px}
  .badge{font-size:26px;letter-spacing:3px;padding:8px 20px}
  #target{font-size:11px}
  #tiers{font-size:9px;letter-spacing:1px}
}
</style>
</head>
<body>
<div id="catcher"></div>
<a href="../" id="homeBtn"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Home</a>
<div id="title">React</div>
<div id="target">Stop at exactly 10.000</div>
<div id="timer">0.000</div>
<div id="hint">Press Start. Then click anywhere the moment the clock hits 10.000.</div>
<button id="startBtn">Start</button>
<div id="result">
  <div id="verdict" class="badge"></div>
  <div id="delta"></div>
  <div id="best"></div>
</div>
<div id="tiers">
  <span class="t">React 0ms</span><span class="t">Laser ≤3</span><span class="t">Sniper ≤15</span><span class="t">Sharp ≤75</span><span class="t">Steady ≤200</span><span class="t">Slow ≤500</span><span class="t">Whiff</span>
</div>
<script>
(function(){
  var STATE={IDLE:0,RUNNING:1,DONE:2};
  var state=STATE.IDLE;
  var startTime=0,raf=0;
  var timerEl=document.getElementById('timer');
  var hintEl=document.getElementById('hint');
  var startBtn=document.getElementById('startBtn');
  var resultEl=document.getElementById('result');
  var verdictEl=document.getElementById('verdict');
  var deltaEl=document.getElementById('delta');
  var bestEl=document.getElementById('best');
  var catcherEl=document.getElementById('catcher');
  var bestMs=parseFloat(localStorage.getItem('react_best'));
  if(isNaN(bestMs)) bestMs=null;

  function fmtBest(){ return bestMs!==null?('Best: '+bestMs+'ms off'):'No record yet'; }
  bestEl.textContent=fmtBest();

  function tick(){
    var elapsed=performance.now()-startTime;
    timerEl.textContent=(elapsed/1000).toFixed(3);
    if(state===STATE.RUNNING) raf=requestAnimationFrame(tick);
  }

  function start(){
    state=STATE.RUNNING;
    startTime=performance.now();
    resultEl.classList.remove('shown');
    startBtn.classList.add('hidden');
    catcherEl.classList.add('active');
    hintEl.textContent='Click / tap / press space — anywhere — to stop';
    timerEl.className='running';
    tick();
  }

  function tierFor(deltaMs){
    if(deltaMs===0) return {name:'REACT', cls:'react', tcls:'bullseye'};
    if(deltaMs<=3)  return {name:'LASER',  cls:'laser',  tcls:'bullseye'};
    if(deltaMs<=15) return {name:'SNIPER', cls:'sniper', tcls:'running'};
    if(deltaMs<=75) return {name:'SHARP',  cls:'sharp',  tcls:'running'};
    if(deltaMs<=200)return {name:'STEADY', cls:'steady', tcls:'running'};
    if(deltaMs<=500)return {name:'SLOW',   cls:'slow',   tcls:'miss'};
    return                {name:'WHIFF',  cls:'whiff',  tcls:'miss'};
  }

  function stop(){
    if(state!==STATE.RUNNING) return;
    cancelAnimationFrame(raf);
    var elapsed=performance.now()-startTime;
    state=STATE.DONE;
    catcherEl.classList.remove('active');
    timerEl.textContent=(elapsed/1000).toFixed(3);
    var deltaRaw=Math.abs(elapsed-10000);
    var deltaDisp=deltaRaw<1?deltaRaw.toFixed(2):Math.round(deltaRaw);
    var deltaTier=Math.round(deltaRaw);
    var dir=elapsed<10000?'early':'late';
    var t=tierFor(deltaTier);
    timerEl.className=t.tcls;
    verdictEl.textContent=t.name;
    verdictEl.className='badge '+t.cls;
    deltaEl.textContent=deltaDisp+'ms '+dir;
    if(bestMs===null||deltaRaw<bestMs){
      bestMs=deltaRaw<1?+deltaRaw.toFixed(2):Math.round(deltaRaw);
      localStorage.setItem('react_best',bestMs);
      bestEl.textContent='🏆 New best: '+bestMs+'ms off';
    }else{
      bestEl.textContent=fmtBest();
    }
    resultEl.classList.add('shown');
    hintEl.textContent='';
    startBtn.classList.remove('hidden');
    startBtn.textContent='Try Again';
  }

  startBtn.addEventListener('click',function(e){
    e.stopPropagation();
    if(state===STATE.IDLE||state===STATE.DONE) start();
  });

  // First touch/click anywhere fires this; pointerdown beats click on every
  // input device (mouse, touch, pen) so the stop registers as fast as possible.
  function tryStop(e){
    if(state!==STATE.RUNNING) return;
    if(e.target&&e.target.closest&&e.target.closest('#homeBtn,#startBtn')) return;
    e.preventDefault();
    stop();
  }
  window.addEventListener('pointerdown',tryStop);
  window.addEventListener('click',tryStop);
  window.addEventListener('touchstart',tryStop,{passive:false});

  window.addEventListener('keydown',function(e){
    if(e.code==='Space'||e.code==='Enter'){
      e.preventDefault();
      if(state===STATE.IDLE||state===STATE.DONE) start();
      else if(state===STATE.RUNNING) stop();
    }
  });
})();
</script>
</body>
</html>
