<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GlidePath — BrainSmacks</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e0e12;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#hud{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:18px;align-items:center;pointer-events:auto}
#hud span{font-size:14px;color:#b0b0b0}
#hud .val{color:#c084fc;font-weight:700}
#actions{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:10px;pointer-events:auto}
.btn{background:#7c3aed;color:#fff;border:none;padding:8px 20px;border-radius:6px;font-size:14px;cursor:pointer;font-weight:600;transition:background .2s}
.btn:hover{background:#6d28d9}
.btn.secondary{background:#2a2a35;color:#c084fc}
.btn.secondary:hover{background:#3a3a48}
.btn:disabled{opacity:.4;cursor:default}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(14,14,18,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:auto;z-index:20}
#overlay.hidden{display:none}
#overlay h1{font-size:42px;color:#c084fc;margin-bottom:4px}
#overlay h2{font-size:24px;color:#c084fc;margin-bottom:8px}
#overlay .sub{color:#888;font-size:15px;margin-bottom:24px}
#overlay .info{color:#b0b0b0;font-size:14px;max-width:400px;text-align:center;line-height:1.6;margin-bottom:20px}
#overlay .stars{font-size:36px;margin-bottom:16px;letter-spacing:4px}
#overlay .stat{color:#888;font-size:14px;margin-bottom:6px}
canvas{display:block;border-radius:8px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud">
    <span>Level <span class="val" id="lvlNum">1</span></span>
    <span>Strokes: <span class="val" id="strokeCount">0</span></span>
    <span>Best: <span class="val" id="bestScore">—</span></span>
  </div>
  <div id="actions">
    <button class="btn" id="launchBtn" onclick="Game.launch()">Launch</button>
    <button class="btn secondary" id="clearBtn" onclick="Game.clearWinds()">Clear</button>
    <button class="btn secondary" id="undoBtn" onclick="Game.undo()">Undo</button>
    <button class="btn secondary" id="resetBtn" onclick="Game.resetLevel()">Reset</button>
  </div>
</div>
<div id="overlay">
  <h1>GlidePath</h1>
  <div class="sub">Draw wind currents. Guide the parachutist.</div>
  <div class="info">Click and drag to draw wind currents on the screen. The direction you draw determines which way the wind blows. Then hit Launch and watch your parachutist ride the breeze to the landing zone!</div>
  <button class="btn" onclick="Game.start()">Play</button>
</div>

<script>
var Game = (function(){
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var W, H;
  var state = 'menu'; // menu, draw, fly, landed, crashed
  var winds = [];
  var currentWind = null;
  var chute = null;
  var level = 0;
  var levels = [];
  var particles = [];
  var trail = [];
  var landResult = null;
  var animFrame = null;
  var bestScores = {};

  // --- Sizing ---
  function resize(){
    var maxW = Math.min(window.innerWidth - 20, 900);
    var maxH = Math.min(window.innerHeight - 20, 640);
    // keep 900:640 aspect
    var ratio = 900/640;
    if(maxW/maxH > ratio){ maxW = maxH * ratio; }
    else { maxH = maxW / ratio; }
    W = Math.floor(maxW); H = Math.floor(maxH);
    canvas.width = W; canvas.height = H;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
  }

  // --- Levels ---
  function buildLevels(){
    levels = [];
    // Level 1: Simple drop, landing zone bottom-center
    levels.push({
      spawn: {x:0.5, y:0.06},
      land: {x:0.5, y:0.88, w:0.12},
      obstacles: [],
      bg: '#0e1218'
    });
    // Level 2: Offset landing
    levels.push({
      spawn: {x:0.15, y:0.06},
      land: {x:0.8, y:0.88, w:0.10},
      obstacles: [],
      bg: '#0e1218'
    });
    // Level 3: Wall obstacle
    levels.push({
      spawn: {x:0.5, y:0.06},
      land: {x:0.78, y:0.88, w:0.10},
      obstacles: [{x:0.48, y:0.35, w:0.04, h:0.35}],
      bg: '#0e1520'
    });
    // Level 4: Narrow gap
    levels.push({
      spawn: {x:0.2, y:0.06},
      land: {x:0.82, y:0.88, w:0.08},
      obstacles: [
        {x:0.0, y:0.50, w:0.40, h:0.04},
        {x:0.52, y:0.50, w:0.48, h:0.04}
      ],
      bg: '#0e1520'
    });
    // Level 5: Zigzag
    levels.push({
      spawn: {x:0.1, y:0.06},
      land: {x:0.15, y:0.88, w:0.09},
      obstacles: [
        {x:0.0, y:0.30, w:0.55, h:0.03},
        {x:0.45, y:0.55, w:0.55, h:0.03},
        {x:0.0, y:0.75, w:0.45, h:0.03}
      ],
      bg: '#101420'
    });
    // Level 6: Corridor
    levels.push({
      spawn: {x:0.5, y:0.06},
      land: {x:0.5, y:0.88, w:0.08},
      obstacles: [
        {x:0.0, y:0.25, w:0.38, h:0.03},
        {x:0.62, y:0.25, w:0.38, h:0.03},
        {x:0.0, y:0.55, w:0.30, h:0.03},
        {x:0.70, y:0.55, w:0.30, h:0.03}
      ],
      bg: '#101420'
    });
    // Level 7: Moving target feel — tight landing
    levels.push({
      spawn: {x:0.85, y:0.06},
      land: {x:0.12, y:0.88, w:0.07},
      obstacles: [
        {x:0.55, y:0.20, w:0.04, h:0.45},
        {x:0.25, y:0.50, w:0.30, h:0.03}
      ],
      bg: '#10141e'
    });
    // Level 8: Maze-like
    levels.push({
      spawn: {x:0.5, y:0.06},
      land: {x:0.5, y:0.88, w:0.06},
      obstacles: [
        {x:0.30, y:0.20, w:0.03, h:0.30},
        {x:0.67, y:0.20, w:0.03, h:0.30},
        {x:0.30, y:0.50, w:0.40, h:0.03},
        {x:0.15, y:0.70, w:0.03, h:0.20},
        {x:0.82, y:0.70, w:0.03, h:0.20},
        {x:0.15, y:0.70, w:0.70, h:0.03}
      ],
      bg: '#10141e'
    });
    // Level 9: Updraft needed
    levels.push({
      spawn: {x:0.1, y:0.75},
      land: {x:0.85, y:0.12, w:0.08},
      obstacles: [
        {x:0.40, y:0.0, w:0.03, h:0.55},
        {x:0.40, y:0.65, w:0.03, h:0.35}
      ],
      bg: '#0e1825'
    });
    // Level 10: The gauntlet
    levels.push({
      spawn: {x:0.05, y:0.06},
      land: {x:0.92, y:0.88, w:0.06},
      obstacles: [
        {x:0.20, y:0.0, w:0.03, h:0.35},
        {x:0.20, y:0.45, w:0.50, h:0.03},
        {x:0.70, y:0.45, w:0.03, h:0.30},
        {x:0.35, y:0.75, w:0.38, h:0.03},
        {x:0.35, y:0.20, w:0.03, h:0.25}
      ],
      bg: '#0e1825'
    });
  }

  // --- Chute physics ---
  function makeChute(lv){
    return {
      x: lv.spawn.x * W,
      y: lv.spawn.y * H,
      vx: 0,
      vy: 0,
      radius: 8,
      gravity: 45,
      drag: 0.985,
      deployed: true
    };
  }

  // --- Wind current as series of points ---
  function windForceAt(wx, wy, wind){
    // Find closest segment, apply force if within influence radius
    var pts = wind.points;
    var influence = 50; // px radius
    var best = influence + 1;
    var fdx = 0, fdy = 0;
    for(var i = 0; i < pts.length - 1; i++){
      var ax = pts[i].x, ay = pts[i].y;
      var bx = pts[i+1].x, by = pts[i+1].y;
      // project point onto segment
      var dx = bx - ax, dy = by - ay;
      var len2 = dx*dx + dy*dy;
      if(len2 < 1) continue;
      var t = Math.max(0, Math.min(1, ((wx-ax)*dx + (wy-ay)*dy) / len2));
      var px = ax + t*dx, py = ay + t*dy;
      var dist = Math.sqrt((wx-px)*(wx-px) + (wy-py)*(wy-py));
      if(dist < best){
        best = dist;
        var len = Math.sqrt(len2);
        fdx = dx/len;
        fdy = dy/len;
      }
    }
    if(best < influence){
      var strength = 280 * (1 - best/influence);
      return {fx: fdx * strength, fy: fdy * strength};
    }
    return null;
  }

  // --- Collision ---
  function rectHit(x, y, r, obs){
    var ox = obs.x * W, oy = obs.y * H, ow = obs.w * W, oh = obs.h * H;
    var cx = Math.max(ox, Math.min(x, ox + ow));
    var cy = Math.max(oy, Math.min(y, oy + oh));
    var dx = x - cx, dy = y - cy;
    return dx*dx + dy*dy < r*r;
  }

  // --- Particles ---
  function spawnParticles(x, y, color, count){
    for(var i = 0; i < count; i++){
      var a = Math.random() * Math.PI * 2;
      var sp = Math.random() * 80 + 20;
      particles.push({x:x, y:y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:1, color:color, size: Math.random()*3+1});
    }
  }

  // --- Drawing ---
  function drawBg(lv){
    ctx.fillStyle = lv.bg;
    ctx.fillRect(0, 0, W, H);
    // subtle grid
    ctx.strokeStyle = 'rgba(124,58,237,0.04)';
    ctx.lineWidth = 1;
    for(var x = 0; x < W; x += 40){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for(var y = 0; y < H; y += 40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  }

  function drawObstacles(lv){
    ctx.fillStyle = '#2a2a40';
    ctx.strokeStyle = '#5b4f8a';
    ctx.lineWidth = 2;
    for(var i = 0; i < lv.obstacles.length; i++){
      var o = lv.obstacles[i];
      var rx = o.x*W, ry = o.y*H, rw = o.w*W, rh = o.h*H;
      ctx.fillRect(rx, ry, rw, rh);
      ctx.strokeRect(rx, ry, rw, rh);
    }
  }

  function drawLandingZone(lv){
    var lx = (lv.land.x - lv.land.w/2) * W;
    var ly = lv.land.y * H;
    var lw = lv.land.w * W;
    var lh = 10;
    // glow
    ctx.shadowColor = '#22c55e';
    ctx.shadowBlur = 18;
    ctx.fillStyle = '#22c55e';
    ctx.fillRect(lx, ly, lw, lh);
    ctx.shadowBlur = 0;
    // chevrons
    ctx.fillStyle = '#166534';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('▼', lv.land.x * W, ly - 4);
  }

  function drawWinds(){
    for(var w = 0; w < winds.length; w++){
      drawWind(winds[w], 'rgba(96,165,250,0.5)');
    }
    if(currentWind && currentWind.points.length > 1){
      drawWind(currentWind, 'rgba(96,165,250,0.7)');
    }
  }

  function drawWind(wind, color){
    var pts = wind.points;
    if(pts.length < 2) return;
    ctx.strokeStyle = color;
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for(var i = 1; i < pts.length; i++){
      ctx.lineTo(pts[i].x, pts[i].y);
    }
    ctx.stroke();

    // arrowheads every ~60px
    for(var i = 0; i < pts.length - 1; i += 3){
      var j = Math.min(i+1, pts.length-1);
      var dx = pts[j].x - pts[i].x;
      var dy = pts[j].y - pts[i].y;
      var len = Math.sqrt(dx*dx+dy*dy);
      if(len < 5) continue;
      var mx = (pts[i].x + pts[j].x)/2;
      var my = (pts[i].y + pts[j].y)/2;
      var angle = Math.atan2(dy, dx);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(mx + Math.cos(angle)*8, my + Math.sin(angle)*8);
      ctx.lineTo(mx + Math.cos(angle+2.5)*6, my + Math.sin(angle+2.5)*6);
      ctx.lineTo(mx + Math.cos(angle-2.5)*6, my + Math.sin(angle-2.5)*6);
      ctx.fill();
    }
  }

  function drawChute(){
    if(!chute) return;
    var x = chute.x, y = chute.y;
    // parachute canopy
    ctx.fillStyle = 'rgba(192,132,252,0.85)';
    ctx.beginPath();
    ctx.arc(x, y - 18, 14, Math.PI, 0);
    ctx.fill();
    // lines
    ctx.strokeStyle = 'rgba(192,132,252,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x-12, y-14); ctx.lineTo(x-3, y-2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+12, y-14); ctx.lineTo(x+3, y-2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x, y-18); ctx.lineTo(x, y-2); ctx.stroke();
    // body
    ctx.fillStyle = '#e0e0e0';
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI*2);
    ctx.fill();
  }

  function drawTrail(){
    for(var i = 0; i < trail.length; i++){
      var t = trail[i];
      var alpha = t.life * 0.3;
      ctx.fillStyle = 'rgba(192,132,252,'+alpha+')';
      ctx.beginPath();
      ctx.arc(t.x, t.y, 2, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function drawParticles(){
    for(var i = 0; i < particles.length; i++){
      var p = particles[i];
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // --- Wind ambient particles ---
  var windMotes = [];
  function updateWindMotes(dt){
    // Spawn near wind currents
    if(Math.random() < 0.3 && winds.length > 0){
      var w = winds[Math.floor(Math.random()*winds.length)];
      var pi = Math.floor(Math.random()*w.points.length);
      var pt = w.points[pi];
      windMotes.push({
        x: pt.x + (Math.random()-0.5)*40,
        y: pt.y + (Math.random()-0.5)*40,
        vx: 0, vy: 0, life: 1, maxLife: 1
      });
    }
    for(var i = windMotes.length - 1; i >= 0; i--){
      var m = windMotes[i];
      // apply wind
      var totalFx = 0, totalFy = 0;
      for(var w = 0; w < winds.length; w++){
        var f = windForceAt(m.x, m.y, winds[w]);
        if(f){ totalFx += f.fx; totalFy += f.fy; }
      }
      m.vx += totalFx * dt * 0.5;
      m.vy += totalFy * dt * 0.5;
      m.vx *= 0.95; m.vy *= 0.95;
      m.x += m.vx * dt;
      m.y += m.vy * dt;
      m.life -= dt * 0.8;
      if(m.life <= 0 || m.x < 0 || m.x > W || m.y < 0 || m.y > H){
        windMotes.splice(i, 1);
      }
    }
  }

  function drawWindMotes(){
    for(var i = 0; i < windMotes.length; i++){
      var m = windMotes[i];
      ctx.globalAlpha = m.life * 0.4;
      ctx.fillStyle = '#60a5fa';
      ctx.beginPath();
      ctx.arc(m.x, m.y, 1.5, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // --- Update ---
  var lastTime = 0;
  function update(ts){
    animFrame = requestAnimationFrame(update);
    var dt = Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;

    var lv = levels[level];

    // update particles
    for(var i = particles.length-1; i >= 0; i--){
      var p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 60 * dt;
      p.life -= dt * 1.5;
      if(p.life <= 0) particles.splice(i, 1);
    }

    // trail fade
    for(var i = trail.length-1; i >= 0; i--){
      trail[i].life -= dt * 0.8;
      if(trail[i].life <= 0) trail.splice(i, 1);
    }

    updateWindMotes(dt);

    if(state === 'fly' && chute){
      // gravity
      chute.vy += chute.gravity * dt;
      // wind forces
      var totalFx = 0, totalFy = 0;
      for(var w = 0; w < winds.length; w++){
        var f = windForceAt(chute.x, chute.y, winds[w]);
        if(f){ totalFx += f.fx; totalFy += f.fy; }
      }
      chute.vx += totalFx * dt;
      chute.vy += totalFy * dt;
      // drag
      chute.vx *= chute.drag;
      chute.vy *= chute.drag;
      chute.x += chute.vx * dt;
      chute.y += chute.vy * dt;

      // trail
      trail.push({x: chute.x, y: chute.y, life: 1});

      // check landing zone
      var lx = (lv.land.x - lv.land.w/2) * W;
      var ly = lv.land.y * H;
      var lw = lv.land.w * W;
      if(chute.y >= ly && chute.x >= lx && chute.x <= lx + lw){
        // landed!
        state = 'landed';
        var center = lv.land.x * W;
        var dist = Math.abs(chute.x - center);
        var maxDist = lw / 2;
        var accuracy = Math.max(0, 1 - dist / maxDist);
        var stars = accuracy > 0.85 ? 3 : accuracy > 0.5 ? 2 : 1;
        landResult = {accuracy: accuracy, stars: stars, strokes: winds.length};
        spawnParticles(chute.x, chute.y, '#22c55e', 30);
        saveBest(level, stars);
        setTimeout(showResult, 600);
      }
      // check obstacle collision
      for(var i = 0; i < lv.obstacles.length; i++){
        if(rectHit(chute.x, chute.y, chute.radius, lv.obstacles[i])){
          state = 'crashed';
          spawnParticles(chute.x, chute.y, '#ef4444', 25);
          setTimeout(function(){ showCrash(); }, 600);
          break;
        }
      }
      // check out of bounds
      if(chute.x < -20 || chute.x > W+20 || chute.y > H+20 || chute.y < -50){
        state = 'crashed';
        setTimeout(function(){ showCrash(); }, 300);
      }
    }

    // --- Draw ---
    drawBg(lv);
    drawObstacles(lv);
    drawLandingZone(lv);
    drawWinds();
    drawWindMotes();
    drawTrail();
    if(state === 'draw'){
      // draw spawn indicator
      ctx.fillStyle = 'rgba(192,132,252,0.3)';
      ctx.beginPath();
      ctx.arc(lv.spawn.x * W, lv.spawn.y * H, 12, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#c084fc';
      ctx.beginPath();
      ctx.arc(lv.spawn.x * W, lv.spawn.y * H, 5, 0, Math.PI*2);
      ctx.fill();
    }
    if(chute && (state === 'fly' || state === 'landed' || state === 'crashed')){
      drawChute();
    }
    drawParticles();
  }

  // --- Results ---
  function showResult(){
    var ov = document.getElementById('overlay');
    ov.className = '';
    var starStr = '';
    for(var i = 0; i < 3; i++) starStr += i < landResult.stars ? '★' : '☆';
    ov.innerHTML = '<h2>Landed!</h2>' +
      '<div class="stars" style="color:#c084fc">' + starStr + '</div>' +
      '<div class="stat">Accuracy: ' + Math.round(landResult.accuracy*100) + '%</div>' +
      '<div class="stat">Wind strokes: ' + landResult.strokes + '</div>' +
      (level < levels.length - 1 ?
        '<button class="btn" onclick="Game.nextLevel()" style="margin-top:16px">Next Level</button>' :
        '<div class="sub" style="margin-top:12px">You completed all levels!</div>' +
        '<button class="btn" onclick="Game.goToLevel(0)" style="margin-top:8px">Play Again</button>');
  }

  function showCrash(){
    var ov = document.getElementById('overlay');
    ov.className = '';
    ov.innerHTML = '<h2 style="color:#ef4444">Crashed!</h2>' +
      '<div class="sub">Your parachutist didn\'t make it.</div>' +
      '<button class="btn" onclick="Game.resetLevel()" style="margin-top:16px">Try Again</button>';
  }

  // --- Best scores ---
  function saveBest(lvl, stars){
    var key = 'glidepath_best';
    try { bestScores = JSON.parse(localStorage.getItem(key)) || {}; } catch(e){}
    if(!bestScores[lvl] || stars > bestScores[lvl]) bestScores[lvl] = stars;
    localStorage.setItem(key, JSON.stringify(bestScores));
    updateHud();
  }

  function updateHud(){
    document.getElementById('lvlNum').textContent = level + 1;
    document.getElementById('strokeCount').textContent = winds.length;
    var b = bestScores[level];
    document.getElementById('bestScore').textContent = b ? ('★'.repeat(b) + '☆'.repeat(3-b)) : '—';
  }

  // --- Input ---
  var drawing = false;
  canvas.addEventListener('mousedown', function(e){
    if(state !== 'draw') return;
    var r = canvas.getBoundingClientRect();
    var x = (e.clientX - r.left) * (W / r.width);
    var y = (e.clientY - r.top) * (H / r.height);
    drawing = true;
    currentWind = {points: [{x:x, y:y}]};
  });
  canvas.addEventListener('mousemove', function(e){
    if(!drawing || !currentWind) return;
    var r = canvas.getBoundingClientRect();
    var x = (e.clientX - r.left) * (W / r.width);
    var y = (e.clientY - r.top) * (H / r.height);
    var pts = currentWind.points;
    var last = pts[pts.length-1];
    var dx = x-last.x, dy = y-last.y;
    if(dx*dx+dy*dy > 100){ // min 10px between points
      pts.push({x:x, y:y});
    }
  });
  canvas.addEventListener('mouseup', function(){
    if(!drawing) return;
    drawing = false;
    if(currentWind && currentWind.points.length >= 2){
      winds.push(currentWind);
      updateHud();
    }
    currentWind = null;
  });

  // Touch support
  canvas.addEventListener('touchstart', function(e){
    e.preventDefault();
    if(state !== 'draw') return;
    var t = e.touches[0];
    var r = canvas.getBoundingClientRect();
    var x = (t.clientX - r.left) * (W / r.width);
    var y = (t.clientY - r.top) * (H / r.height);
    drawing = true;
    currentWind = {points: [{x:x, y:y}]};
  }, {passive:false});
  canvas.addEventListener('touchmove', function(e){
    e.preventDefault();
    if(!drawing || !currentWind) return;
    var t = e.touches[0];
    var r = canvas.getBoundingClientRect();
    var x = (t.clientX - r.left) * (W / r.width);
    var y = (t.clientY - r.top) * (H / r.height);
    var pts = currentWind.points;
    var last = pts[pts.length-1];
    var dx = x-last.x, dy = y-last.y;
    if(dx*dx+dy*dy > 100){
      pts.push({x:x, y:y});
    }
  }, {passive:false});
  canvas.addEventListener('touchend', function(e){
    e.preventDefault();
    if(!drawing) return;
    drawing = false;
    if(currentWind && currentWind.points.length >= 2){
      winds.push(currentWind);
      updateHud();
    }
    currentWind = null;
  }, {passive:false});

  // --- Public API ---
  return {
    start: function(){
      level = 0;
      try { bestScores = JSON.parse(localStorage.getItem('glidepath_best')) || {}; } catch(e){ bestScores = {}; }
      resize();
      window.addEventListener('resize', resize);
      document.getElementById('overlay').className = 'hidden';
      state = 'draw';
      winds = [];
      chute = null;
      trail = [];
      particles = [];
      windMotes = [];
      updateHud();
      if(!animFrame) animFrame = requestAnimationFrame(update);
    },
    launch: function(){
      if(state !== 'draw') return;
      state = 'fly';
      chute = makeChute(levels[level]);
      trail = [];
      document.getElementById('launchBtn').disabled = true;
    },
    clearWinds: function(){
      if(state !== 'draw') return;
      winds = [];
      windMotes = [];
      updateHud();
    },
    undo: function(){
      if(state !== 'draw' || winds.length === 0) return;
      winds.pop();
      updateHud();
    },
    resetLevel: function(){
      state = 'draw';
      winds = [];
      chute = null;
      trail = [];
      particles = [];
      windMotes = [];
      document.getElementById('overlay').className = 'hidden';
      document.getElementById('launchBtn').disabled = false;
      updateHud();
    },
    nextLevel: function(){
      level++;
      if(level >= levels.length) level = 0;
      this.resetLevel();
    },
    goToLevel: function(n){
      level = n;
      this.resetLevel();
    },
    init: function(){
      buildLevels();
      resize();
    }
  };
})();

Game.init();
</script>
</body>
</html>
