<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Ember — BrainSmacks</title>
<meta name="description" content="You are a tiny ember on a mission to light the pyres! Run, jump, dodge hazards, and stay ahead of the Wind Spirit in this addictive platformer.">
<link rel="canonical" href="https://brainsmacks.com/ember/">
<meta property="og:title" content="Ember — BrainSmacks">
<meta property="og:description" content="Light the pyres, outrun the wind. How far can you go?">
<meta property="og:url" content="https://brainsmacks.com/ember/">
<meta property="og:type" content="website">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;overflow:hidden;height:100vh;height:100dvh;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Segoe UI',Roboto,'Helvetica Neue',sans-serif}
canvas{display:block;width:100%;height:100%}
#homeBtn{position:fixed;top:10px;left:10px;z-index:9999;background:rgba(255,255,255,.08);color:#ccc;text-decoration:none;padding:6px 14px;border-radius:20px;font-size:14px;opacity:.5;transition:opacity .2s}
#homeBtn:hover{opacity:1}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;pointer-events:none}
#ui.active{pointer-events:auto}
#title{font-size:52px;font-weight:900;color:#ff6b2b;text-shadow:0 0 40px rgba(255,107,43,.5),0 0 80px rgba(255,60,0,.3);letter-spacing:-2px;margin-bottom:4px}
#subtitle{color:#ff9a5c;font-size:14px;margin-bottom:24px;opacity:.7}
.menu-btn{background:linear-gradient(135deg,#ff6b2b,#ff4500);color:#fff;border:none;padding:14px 40px;border-radius:30px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(255,69,0,.4);letter-spacing:.5px;margin:4px}
.menu-btn:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(255,69,0,.6)}
.menu-btn:active{transform:translateY(1px)}
.menu-btn.sm{background:rgba(255,255,255,.08);box-shadow:none;padding:10px 24px;font-size:13px}
.menu-btn.sm:hover{background:rgba(255,255,255,.15)}
#hud{position:fixed;top:0;left:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:10px 16px;z-index:20;pointer-events:none}
#hud .hud-item{text-align:center}
#hud .hv{font-size:22px;font-weight:900;color:#ff9a5c;text-shadow:0 0 12px rgba(255,107,43,.3);line-height:1}
#hud .hl{font-size:9px;color:rgba(255,154,92,.4);text-transform:uppercase;letter-spacing:2px}
#fuel-wrap{width:100px;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-top:2px}
#fuel-fill{width:100%;height:100%;background:linear-gradient(90deg,#ff4500,#ff6b2b,#ffaa00);border-radius:3px;transition:width .15s;box-shadow:0 0 8px rgba(255,69,0,.5)}
#game-over{display:none;flex-direction:column;align-items:center}
#game-over.show{display:flex}
#go-score{font-size:64px;font-weight:900;color:#ff6b2b;text-shadow:0 0 40px rgba(255,107,43,.5);line-height:1;margin-bottom:0}
#go-label{font-size:12px;color:rgba(255,154,92,.5);text-transform:uppercase;letter-spacing:3px;margin-bottom:4px}
#go-best{font-size:14px;color:#ff9a5c;margin-bottom:4px;opacity:.6}
#go-new{font-size:13px;color:#ffaa00;font-weight:700;margin-bottom:8px;display:none}
.stats-row{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
.stat-box{text-align:center}
.stat-box .sv{font-size:20px;font-weight:800;color:#ff9a5c}
.stat-box .sl{font-size:9px;color:rgba(255,154,92,.4);text-transform:uppercase;letter-spacing:1px}
#start-screen{display:flex;flex-direction:column;align-items:center}
#instructions{color:rgba(255,154,92,.5);font-size:12px;margin-top:16px;text-align:center;line-height:1.8;max-width:280px}
#popup{position:fixed;top:15%;left:50%;transform:translateX(-50%);z-index:15;pointer-events:none;text-align:center;opacity:0;transition:opacity .3s}
#popup .pop-main{font-size:32px;font-weight:900;color:#ffaa00;text-shadow:0 0 20px rgba(255,170,0,.6)}
#popup .pop-sub{font-size:13px;color:#ff9a5c;opacity:.7}
</style>
</head>
<body>
<a id="homeBtn" href="/">← BrainSmacks</a>
<canvas id="c"></canvas>
<div id="hud" style="display:none">
  <div class="hud-item"><div class="hl">Pyres</div><div class="hv" id="hud-pyres">0</div></div>
  <div class="hud-item"><div class="hl">Fuel</div><div id="fuel-wrap"><div id="fuel-fill"></div></div></div>
  <div class="hud-item"><div class="hl">Distance</div><div class="hv" id="hud-dist">0</div></div>
</div>
<div id="popup"><div class="pop-main"></div><div class="pop-sub"></div></div>
<div id="ui" class="active">
  <div id="start-screen">
    <div id="title">Ember</div>
    <div id="subtitle">Light the pyres. Outrun the wind.</div>
    <button class="menu-btn" id="playBtn">Play</button>
    <div id="instructions">
      Jump: Space / Up / W / Tap center<br>
      Move: Arrows / A,D / Tap sides<br>
      Light pyres to refuel<br>
      Collect power-ups to survive<br>
      Stay ahead of the Wind Spirit
    </div>
  </div>
  <div id="game-over">
    <div id="go-label">Pyres Lit</div>
    <div id="go-score">0</div>
    <div id="go-new">New Best!</div>
    <div id="go-best">Best: 0</div>
    <div class="stats-row">
      <div class="stat-box"><div class="sv" id="go-dist">0</div><div class="sl">Distance</div></div>
      <div class="stat-box"><div class="sv" id="go-combo">0</div><div class="sl">Best Combo</div></div>
      <div class="stat-box"><div class="sv" id="go-sparks">0</div><div class="sl">Sparks</div></div>
      <div class="stat-box"><div class="sv" id="go-time">0s</div><div class="sl">Time</div></div>
    </div>
    <button class="menu-btn" id="retryBtn">Try Again</button>
    <button class="menu-btn sm" id="menuBtn" style="margin-top:8px">Menu</button>
  </div>
</div>

<script>
(function(){
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var W, H, dpr;

  function resize(){
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W*dpr; canvas.height = H*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize();
  window.addEventListener('resize', resize);

  // ---- Constants ----
  var GROUND_FRAC = 0.82;
  var PW = 14, PH = 18;
  var BASE_SPEED = 3.0;
  var JUMP_VEL = -10;
  var GRAV = 0.42;
  var FUEL_MAX = 100;
  var FUEL_DRAIN = 0.05;
  var FUEL_PER_PYRE = 28;
  var WIND_START = -350;
  var WIND_SPEED = 2.4;
  var MAX_P = 120; // particles
  var PLAT_MIN_W = 120;
  var PLAT_MAX_W = 320;

  // ---- State ----
  var state = 'menu';
  var pl = {}; // player
  var platforms = [], pyres = [], hazards = [], pickups = [], particles = [];
  var wind = {};
  var camX = 0, groundY = 0;
  var score = 0, distance = 0, bestScore = 0;
  var combo = 0, bestCombo = 0, comboTimer = 0;
  var totalSparks = 0;
  var startTime = 0, frame = 0, shake = 0;
  var lastPlatEnd = 0;
  var keys = {}, tL = false, tR = false, tJ = false;
  var popupTimer = 0;
  var doubleJumpReady = false; // power-up state
  var shieldTimer = 0;
  var blazeTimer = 0;

  try { bestScore = parseInt(localStorage.getItem('ember3_best'))||0; } catch(e){}

  // ---- Helpers ----
  function addP(p){ if(particles.length>=MAX_P)particles.shift(); particles.push(p); }
  function rng(a,b){ return a+Math.random()*(b-a); }
  function popup(main,sub){
    var el=document.getElementById('popup');
    el.querySelector('.pop-main').textContent=main;
    el.querySelector('.pop-sub').textContent=sub||'';
    el.style.opacity='1'; popupTimer=90;
  }

  // ---- Particles ----
  function trailP(){
    var sx=pl.x-camX;
    addP({x:sx+(Math.random()-.5)*8,y:pl.y+PH*.4+Math.random()*4,
      vx:-.5-Math.random()*.4,vy:-Math.random()*1.5-.5,
      sz:rng(3,7),life:1,dec:rng(.025,.04),t:'f'});
  }
  function pyreP(px,py){
    for(var i=0;i<10;i++) addP({x:px+(Math.random()-.5)*14,y:py+Math.random()*4,
      vx:(Math.random()-.5)*2,vy:-rng(2,5),sz:rng(3,8),life:1,dec:rng(.015,.025),t:'pl'});
  }
  function windP(){
    addP({x:wind.sx+rng(15,35),y:wind.y+(Math.random()-.5)*35,
      vx:rng(2,4),vy:(Math.random()-.5)*.8,sz:rng(2,5),life:1,dec:rng(.03,.05),t:'w'});
  }
  function deathP(){
    for(var i=0;i<20;i++){var a=Math.random()*Math.PI*2,s=rng(1,5);
      addP({x:pl.x-camX+(Math.random()-.5)*14,y:pl.y+(Math.random()-.5)*14,
        vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,sz:rng(3,8),life:1,dec:rng(.015,.025),t:'d'});}
  }
  function sparkP(x,y,col){
    for(var i=0;i<6;i++){var a=Math.random()*Math.PI*2,s=rng(2,5);
      addP({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,sz:rng(1,3),life:1,dec:rng(.03,.05),t:'s',col:col});}
  }
  function shieldP(){
    var sx=pl.x-camX;
    addP({x:sx+(Math.random()-.5)*24,y:pl.y+PH/2+(Math.random()-.5)*24,
      vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,sz:rng(2,4),life:1,dec:rng(.04,.06),t:'sh'});
  }

  // ---- Max jumpable gap calculation ----
  function maxJump(){
    // airtime = 2 * |JUMP_VEL| / GRAV
    var jv = blazeTimer>0 ? JUMP_VEL*1.25 : JUMP_VEL;
    var airtime = 2*Math.abs(jv)/GRAV;
    var speed = BASE_SPEED + Math.min(distance*0.0008, 2) + 2.5; // max input speed
    if(blazeTimer>0) speed *= 1.3;
    return airtime * speed * 0.7; // 70% = comfortable margin
  }

  // ---- Platform generation ----
  function genPlatform(startX){
    var w = rng(PLAT_MIN_W, PLAT_MAX_W);
    // Shrink platforms slightly over time
    w = Math.max(80, w - Math.min(distance*0.03, 80));
    var elevated = Math.random()<0.25 && distance>300;
    var yOff = elevated ? -(rng(30,60)) : 0;
    // Moving platforms after distance 500
    var moving = !elevated && Math.random()<0.15 && distance>500;
    var p = {x:startX, y:groundY+yOff, w:w, h:16, elevated:elevated,
             moving:moving, moveRange:moving?rng(30,60):0, moveSpeed:moving?rng(0.5,1.2):0, movePhase:Math.random()*Math.PI*2};
    platforms.push(p);

    // Pyre on most platforms
    if(Math.random()<0.65 || platforms.length<=2){
      pyres.push({x:p.x+30+Math.random()*(p.w-60), y:p.y, lit:false, h:20, platIdx:platforms.length-1});
    }

    // Hazards: water drips above some platforms (after dist 200)
    if(Math.random()<0.3 && distance>200 && !elevated){
      var hx = p.x + rng(20, p.w-20);
      hazards.push({type:'drip', x:hx, baseY:p.y-rng(80,140), dropY:0, timer:rng(0,120), interval:rng(90,160), active:false, platX:p.x, platW:p.w});
    }

    // Hazards: wind gust zones (after dist 400)
    if(Math.random()<0.2 && distance>400){
      hazards.push({type:'gust', x:p.x+rng(10,p.w*0.3), w:rng(40,80), y:p.y-60, h:60, dir:Math.random()<0.5?-1:1, strength:rng(1.5,3)});
    }

    // Collectible sparks (small bonus flames)
    if(Math.random()<0.4){
      var sparkCount = Math.floor(rng(1,4));
      for(var i=0;i<sparkCount;i++){
        pickups.push({type:'spark', x:p.x+rng(20,p.w-20), y:p.y-rng(25,50), collected:false});
      }
    }

    // Power-up pickups (rare)
    if(Math.random()<0.08 && distance>150){
      var types = ['shield','blaze','djump'];
      var ptype = types[Math.floor(Math.random()*types.length)];
      pickups.push({type:ptype, x:p.x+rng(30,p.w-30), y:p.y-rng(35,55), collected:false});
    }

    return p.x + p.w;
  }

  function ensurePlats(){
    var viewR = camX + W + 500;
    while(lastPlatEnd < viewR){
      var gap = rng(60, 140);
      gap += Math.min(distance*0.015, 50);
      // NEVER exceed jumpable distance
      gap = Math.min(gap, maxJump());
      lastPlatEnd += gap;
      lastPlatEnd = genPlatform(lastPlatEnd);
    }
    var viewL = camX - 150;
    while(platforms.length>0 && platforms[0].x+platforms[0].w<viewL) platforms.shift();
    while(pyres.length>0 && pyres[0].x+30<viewL) pyres.shift();
    while(hazards.length>0 && (hazards[0].x||hazards[0].platX||0)+200<viewL) hazards.shift();
    while(pickups.length>0 && pickups[0].x+20<viewL) pickups.shift();
  }

  // ---- Game ----
  function startGame(){
    state='play';
    groundY = H*GROUND_FRAC;
    camX=0; distance=0; score=0; combo=0; bestCombo=0; comboTimer=0;
    totalSparks=0; frame=0; shake=0; popupTimer=0;
    doubleJumpReady=false; shieldTimer=0; blazeTimer=0;
    startTime=Date.now();
    particles=[]; platforms=[]; pyres=[]; hazards=[]; pickups=[];

    pl={x:80, y:groundY-PH, vx:0, vy:0, onGround:true, fuel:FUEL_MAX, size:1, jumps:0, maxJumps:1};

    wind={x:WIND_START, sx:0, y:groundY-30, speed:WIND_SPEED};

    lastPlatEnd=-50;
    var fp={x:-50,y:groundY,w:500,h:16,elevated:false,moving:false,moveRange:0,moveSpeed:0,movePhase:0};
    platforms.push(fp);
    pyres.push({x:250,y:groundY,lit:false,h:20,platIdx:0});
    lastPlatEnd=fp.x+fp.w;
    ensurePlats();

    document.getElementById('ui').classList.remove('active');
    document.getElementById('start-screen').style.display='none';
    document.getElementById('game-over').classList.remove('show');
    document.getElementById('hud').style.display='';
  }

  function die(){
    if(state!=='play') return;
    state='dead'; deathP(); shake=12;

    var fs=score, isNew=fs>bestScore;
    if(isNew){ bestScore=fs; try{localStorage.setItem('ember3_best',bestScore);}catch(e){} }
    var elapsed=((Date.now()-startTime)/1000)|0;
    setTimeout(function(){
      document.getElementById('go-score').textContent=fs;
      document.getElementById('go-best').textContent='Best: '+bestScore;
      document.getElementById('go-dist').textContent=Math.floor(distance);
      document.getElementById('go-combo').textContent=bestCombo+'x';
      document.getElementById('go-sparks').textContent=totalSparks;
      document.getElementById('go-time').textContent=elapsed+'s';
      document.getElementById('go-new').style.display=isNew?'':'none';
      document.getElementById('game-over').classList.add('show');
      document.getElementById('ui').classList.add('active');
      document.getElementById('hud').style.display='none';
    },600);
  }

  // ---- Input ----
  document.addEventListener('keydown',function(e){keys[e.key]=true;
    if(e.key===' '||e.key==='ArrowUp'||e.key==='w'||e.key==='W')e.preventDefault();});
  document.addEventListener('keyup',function(e){keys[e.key]=false;});

  canvas.addEventListener('touchstart',function(e){e.preventDefault();
    tL=false;tR=false;tJ=false;
    for(var i=0;i<e.touches.length;i++){var tx=e.touches[i].clientX;
      if(tx<W*0.33)tL=true;else if(tx>W*0.67)tR=true;else tJ=true;}
  },{passive:false});
  canvas.addEventListener('touchmove',function(e){e.preventDefault();
    tL=false;tR=false;tJ=false;
    for(var i=0;i<e.touches.length;i++){var tx=e.touches[i].clientX;
      if(tx<W*0.33)tL=true;else if(tx>W*0.67)tR=true;else tJ=true;}
  },{passive:false});
  canvas.addEventListener('touchend',function(e){e.preventDefault();
    tL=false;tR=false;tJ=false;
    for(var i=0;i<e.touches.length;i++){var tx=e.touches[i].clientX;
      if(tx<W*0.33)tL=true;else if(tx>W*0.67)tR=true;else tJ=true;}
  },{passive:false});

  canvas.addEventListener('mousedown',function(e){if(state==='play'){
    if(e.clientX<W*0.33)tL=true;else if(e.clientX>W*0.67)tR=true;else tJ=true;}});
  canvas.addEventListener('mouseup',function(){tL=false;tR=false;tJ=false;});

  document.getElementById('playBtn').addEventListener('click',startGame);
  document.getElementById('retryBtn').addEventListener('click',startGame);
  document.getElementById('menuBtn').addEventListener('click',function(){
    document.getElementById('game-over').classList.remove('show');
    document.getElementById('start-screen').style.display='flex';});

  function wL(){return keys['ArrowLeft']||keys['a']||keys['A']||tL;}
  function wR(){return keys['ArrowRight']||keys['d']||keys['D']||tR;}
  function wJ(){return keys[' ']||keys['ArrowUp']||keys['w']||keys['W']||tJ;}

  var jumpPressed = false;

  // ---- Update ----
  function update(){
    if(state!=='play') return;
    frame++;
    if(frame>1e8) frame-=1e8;

    // Speed increases gently over time
    var speed = BASE_SPEED + Math.min(distance*0.0008, 2.5);
    if(blazeTimer>0){ speed*=1.3; blazeTimer--; if(blazeTimer<=0) popup('Blaze Off',''); }
    if(shieldTimer>0){ shieldTimer--; if(shieldTimer<=0) popup('Shield Off',''); }

    // Movement
    var inputX = 0;
    if(wL()) inputX = -1;
    if(wR()) inputX = 1;
    pl.vx = speed + inputX*2.5;
    pl.x += pl.vx;

    // Jump (with double jump support)
    var jNow = wJ();
    if(jNow && !jumpPressed){
      if(pl.onGround){
        pl.vy = blazeTimer>0 ? JUMP_VEL*1.2 : JUMP_VEL;
        pl.onGround = false;
        pl.jumps = 1;
      } else if(pl.jumps < pl.maxJumps){
        pl.vy = blazeTimer>0 ? JUMP_VEL*1.1 : JUMP_VEL*0.85;
        pl.jumps++;
        sparkP(pl.x-camX, pl.y+PH, '#ffaa00');
      }
    }
    jumpPressed = jNow;

    // Gravity
    pl.vy += GRAV;
    pl.y += pl.vy;

    // Platform collision
    pl.onGround = false;
    for(var i=0;i<platforms.length;i++){
      var p = platforms[i];
      var py = p.y;
      // Moving platform offset
      if(p.moving) py += Math.sin(frame*0.02+p.movePhase)*p.moveRange;

      if(pl.x > p.x && pl.x < p.x+p.w){
        var bot = pl.y+PH;
        var prevBot = bot - pl.vy;
        if(pl.vy>=0 && prevBot<=py+6 && bot>=py-2){
          pl.y = py - PH;
          pl.vy = 0;
          pl.onGround = true;
          pl.jumps = 0;
          break;
        }
      }
    }

    // Fall death
    if(pl.y > H+60){ die(); return; }

    // Fuel
    pl.fuel -= FUEL_DRAIN + Math.min(distance*0.00002, 0.03);
    pl.fuel = Math.max(0, pl.fuel);
    pl.size = 0.5 + 0.5*(pl.fuel/FUEL_MAX);
    if(pl.fuel<=0){ die(); return; }

    // Camera
    camX += (pl.x - W*0.3 - camX)*0.08;
    distance = pl.x/10;

    ensurePlats();

    // Pyre collision
    for(var i=0;i<pyres.length;i++){
      var pyre=pyres[i];
      if(pyre.lit) continue;
      if(Math.abs(pl.x-pyre.x)<22 && Math.abs(pl.y+PH-pyre.y)<28){
        pyre.lit=true; score++;
        pl.fuel=Math.min(FUEL_MAX, pl.fuel+FUEL_PER_PYRE);
        combo++; if(combo>bestCombo)bestCombo=combo; comboTimer=150;
        pyreP(pyre.x-camX, pyre.y-pyre.h);
        shake=3;
        if(combo>=3) popup(combo+'x Combo','');
        if(combo===5) popup('5x BLAZING!','On fire!');
        if(combo===10) popup('10x INFERNO!','Unstoppable!');
      }
    }
    if(comboTimer>0){comboTimer--;if(comboTimer<=0)combo=0;}

    // Pickups
    var psx = pl.x-camX;
    for(var i=0;i<pickups.length;i++){
      var pk=pickups[i];
      if(pk.collected) continue;
      var pksx = pk.x-camX;
      var dx=pk.x-pl.x, dy=pk.y-(pl.y+PH/2);
      if(Math.abs(dx)<18 && Math.abs(dy)<22){
        pk.collected=true;
        if(pk.type==='spark'){
          totalSparks++; score+=0; // sparks are bonus, tracked separately
          sparkP(pksx, pk.y, '#ffcc44');
        } else if(pk.type==='shield'){
          shieldTimer=480; // 8 seconds
          popup('Flame Shield','Immune to hazards');
          sparkP(pksx, pk.y, '#44aaff');
        } else if(pk.type==='blaze'){
          blazeTimer=360; // 6 seconds
          popup('Blaze Boost','Speed + Jump up!');
          sparkP(pksx, pk.y, '#ff4444');
        } else if(pk.type==='djump'){
          pl.maxJumps=2; doubleJumpReady=true;
          popup('Double Jump','Jump again mid-air!');
          sparkP(pksx, pk.y, '#44ff88');
          // Double jump lasts for the run (permanent until death)
        }
      }
    }

    // Hazards
    for(var i=0;i<hazards.length;i++){
      var hz=hazards[i];
      if(hz.type==='drip'){
        hz.timer--;
        if(hz.timer<=0){
          hz.active=true; hz.dropY=0; hz.timer=hz.interval;
        }
        if(hz.active){
          hz.dropY+=3;
          // Hit player?
          var dsx=hz.x-camX;
          var dy2=hz.baseY+hz.dropY;
          if(shieldTimer<=0 && Math.abs(hz.x-pl.x)<10 && Math.abs(dy2-(pl.y+PH/2))<14){
            pl.fuel-=15; shake=5;
            sparkP(pl.x-camX, pl.y+PH/2, '#4488ff');
            hz.active=false;
            if(pl.fuel<=0){die();return;}
          }
          if(hz.dropY > 200) hz.active=false;
        }
      } else if(hz.type==='gust'){
        var gsx=hz.x-camX;
        // Player in gust zone?
        if(pl.x>hz.x && pl.x<hz.x+hz.w && pl.y+PH>hz.y && pl.y<hz.y+hz.h){
          pl.x += hz.dir * hz.strength;
          // Drain fuel slightly in wind
          if(shieldTimer<=0) pl.fuel -= 0.05;
        }
      }
    }

    // Wind Spirit
    wind.speed = WIND_SPEED + Math.min(distance*0.002, 3);
    var targetWX = pl.x - W*0.65;
    wind.x += (targetWX-wind.x)*0.012 + wind.speed*0.35;
    if(wind.x < pl.x-W*0.85) wind.x = pl.x-W*0.85;
    wind.sx = wind.x-camX;
    wind.y = groundY-25+Math.sin(frame*0.04)*8;

    if(wind.sx > psx-12){ die(); return; }

    // Wind blows out pyres
    for(var i=0;i<pyres.length;i++){
      if(pyres[i].lit && pyres[i].x<wind.x+10) pyres[i].lit=false;
    }

    // HUD
    document.getElementById('hud-pyres').textContent=score;
    document.getElementById('hud-dist').textContent=Math.floor(distance);
    document.getElementById('fuel-fill').style.width=pl.fuel+'%';

    // Popup timer
    if(popupTimer>0){popupTimer--;if(popupTimer<=0)document.getElementById('popup').style.opacity='0';}

    // Trail particles
    if(frame%2===0) trailP();
    if(blazeTimer>0 && frame%1===0) trailP();
    if(frame%4===0) windP();
    if(shieldTimer>0 && frame%3===0) shieldP();
  }

  // ---- Draw ----
  function draw(){
    ctx.clearRect(0,0,W,H);

    var sx=0,sy=0;
    if(shake>0){sx=(Math.random()-.5)*shake*2;sy=(Math.random()-.5)*shake*2;shake*=.85;if(shake<.5)shake=0;}
    ctx.save();
    ctx.translate(sx,sy);

    // Sky
    var np=Math.min(1,distance/800);
    var grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'rgb('+Math.floor(15-np*8)+','+Math.floor(12-np*8)+','+Math.floor(35+np*10)+')');
    grad.addColorStop(1,'rgb('+Math.floor(30-np*15)+','+Math.floor(18-np*12)+','+Math.floor(45-np*10)+')');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

    // Stars
    ctx.fillStyle='#fff';
    for(var i=0;i<50;i++){
      var stX=((i*137+50)%(W+100))-50;
      var stY=((i*89+20)%(groundY-40));
      ctx.globalAlpha=0.12+0.08*Math.sin(frame*.015+i*2.5);
      ctx.beginPath();ctx.arc(stX,stY,.6+Math.sin(i)*.4,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;

    // Mountains (parallax)
    drawMountains();

    // Void below ground
    ctx.fillStyle='#050308';
    ctx.fillRect(0,groundY-2,W,H-groundY+4);

    // Platforms
    for(var i=0;i<platforms.length;i++){
      var p=platforms[i];
      var px=p.x-camX;
      if(px+p.w<-20||px>W+20) continue;

      var py=p.y;
      if(p.moving) py+=Math.sin(frame*0.02+p.movePhase)*p.moveRange;

      if(p.elevated){
        ctx.fillStyle='#3d2e22';ctx.fillRect(px,py,p.w,p.h);
        ctx.fillStyle='#4a3828';ctx.fillRect(px,py,p.w,3);
        ctx.fillStyle='#2a1e15';
        ctx.fillRect(px+10,py+p.h,6,groundY-py-p.h);
        ctx.fillRect(px+p.w-16,py+p.h,6,groundY-py-p.h);
        ctx.fillStyle='#1a1210';ctx.fillRect(px,groundY,p.w,H-groundY);
        ctx.fillStyle='#2a1e18';ctx.fillRect(px,groundY-1,p.w,3);
      } else {
        ctx.fillStyle='#1a1210';ctx.fillRect(px,py,p.w,H-py);
        ctx.fillStyle=p.moving?'#3a2a1a':'#2a1e18';ctx.fillRect(px,py-1,p.w,4);
        ctx.fillStyle='#1e1510';ctx.fillRect(px,py+10,p.w,1);
        ctx.fillStyle='#161010';ctx.fillRect(px,py+24,p.w,1);
      }
      ctx.fillStyle='rgba(0,0,0,.2)';
      ctx.fillRect(px,py,2,Math.min(p.h,H-py));
      ctx.fillRect(px+p.w-2,py,2,Math.min(p.h,H-py));
    }

    // Hazards
    for(var i=0;i<hazards.length;i++){
      var hz=hazards[i];
      if(hz.type==='drip'){
        var dsx=hz.x-camX;
        if(dsx<-30||dsx>W+30) continue;
        // Stalactite
        ctx.fillStyle='#334';ctx.beginPath();
        ctx.moveTo(dsx-4,hz.baseY);ctx.lineTo(dsx+4,hz.baseY);ctx.lineTo(dsx,hz.baseY+10);ctx.fill();
        // Drip
        if(hz.active){
          var dy=hz.baseY+hz.dropY;
          ctx.fillStyle='#4488dd';ctx.globalAlpha=.8;
          ctx.beginPath();
          ctx.moveTo(dsx,dy-6);ctx.quadraticCurveTo(dsx+4,dy,dsx,dy+3);
          ctx.quadraticCurveTo(dsx-4,dy,dsx,dy-6);ctx.fill();
          ctx.globalAlpha=1;
        }
        // Drip warning (shimmering when about to drop)
        if(!hz.active && hz.timer<30){
          ctx.fillStyle='rgba(68,136,221,.4)';
          ctx.beginPath();ctx.arc(dsx,hz.baseY+12,2+Math.sin(frame*.2)*1,0,Math.PI*2);ctx.fill();
        }
      } else if(hz.type==='gust'){
        var gsx=hz.x-camX;
        if(gsx+hz.w<-10||gsx>W+10) continue;
        // Wind zone visual
        ctx.globalAlpha=0.08+0.04*Math.sin(frame*0.05);
        ctx.fillStyle=hz.dir>0?'#8ecae6':'#a0d0e8';
        ctx.fillRect(gsx,hz.y,hz.w,hz.h);
        // Wind lines
        ctx.globalAlpha=0.15;ctx.strokeStyle='#8ecae6';ctx.lineWidth=1;
        for(var j=0;j<3;j++){
          var ly=hz.y+15+j*15;
          var lx=gsx+((frame*hz.dir*1.5+j*20)%hz.w+hz.w)%hz.w;
          ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+hz.dir*15,ly);ctx.stroke();
        }
        ctx.globalAlpha=1;
      }
    }

    // Pickups
    for(var i=0;i<pickups.length;i++){
      var pk=pickups[i];
      if(pk.collected) continue;
      var pkx=pk.x-camX;
      if(pkx<-20||pkx>W+20) continue;
      var bob=Math.sin(frame*0.05+i)*3;

      if(pk.type==='spark'){
        ctx.fillStyle='#ffcc44';ctx.globalAlpha=.7+.2*Math.sin(frame*.08+i);
        ctx.beginPath();ctx.arc(pkx,pk.y+bob,4,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=.2;
        var sg=ctx.createRadialGradient(pkx,pk.y+bob,0,pkx,pk.y+bob,12);
        sg.addColorStop(0,'rgba(255,204,68,.4)');sg.addColorStop(1,'rgba(255,204,68,0)');
        ctx.fillStyle=sg;ctx.fillRect(pkx-12,pk.y+bob-12,24,24);
        ctx.globalAlpha=1;
      } else {
        var cols={shield:'#44aaff',blaze:'#ff4444',djump:'#44ff88'};
        var labels={shield:'S',blaze:'B',djump:'J'};
        var col=cols[pk.type]||'#fff';
        // Glowing orb
        ctx.globalAlpha=.3;
        var og=ctx.createRadialGradient(pkx,pk.y+bob,0,pkx,pk.y+bob,18);
        og.addColorStop(0,col);og.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=og;ctx.fillRect(pkx-18,pk.y+bob-18,36,36);
        ctx.globalAlpha=.9;
        ctx.fillStyle=col;ctx.beginPath();ctx.arc(pkx,pk.y+bob,7,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff';ctx.font='bold 8px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(labels[pk.type],pkx,pk.y+bob+1);
        ctx.globalAlpha=1;
      }
    }

    // Pyres
    for(var i=0;i<pyres.length;i++){
      var pyre=pyres[i]; var px=pyre.x-camX;
      if(px<-30||px>W+30) continue;
      drawPyre(px,pyre.y,pyre.h,pyre.lit);
    }

    // Wind Spirit
    if(state==='play'||state==='dead') drawWind();

    // Particles
    for(var i=particles.length-1;i>=0;i--){
      var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=p.dec;
      if(p.life<=0){particles.splice(i,1);continue;}

      if(p.t==='f'){var t=1-p.life;ctx.globalAlpha=p.life*.7;
        ctx.fillStyle='rgb(255,'+Math.floor(180-t*140)+','+Math.max(0,Math.floor(50-t*50))+')';
      } else if(p.t==='pl'){var t=1-p.life;ctx.globalAlpha=p.life*.8;
        ctx.fillStyle=t<.3?'#fff8e0':t<.5?'#ffaa00':'#ff4500';p.vy-=.02;
      } else if(p.t==='w'){ctx.globalAlpha=p.life*.3;ctx.fillStyle='#8ecae6';
      } else if(p.t==='d'){ctx.globalAlpha=p.life*.8;ctx.fillStyle=p.life>.5?'#ff6b2b':'#880000';p.vy+=.08;
      } else if(p.t==='s'){ctx.globalAlpha=p.life;ctx.fillStyle=p.col||'#fff';p.vy+=.08;
      } else if(p.t==='sh'){ctx.globalAlpha=p.life*.5;ctx.fillStyle='#44aaff';}

      ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;

    // Player
    if(state==='play'){
      var psx=pl.x-camX;
      // Shield aura
      if(shieldTimer>0){
        ctx.globalAlpha=.15+.05*Math.sin(frame*.1);
        var sg=ctx.createRadialGradient(psx,pl.y+PH/2,0,psx,pl.y+PH/2,22);
        sg.addColorStop(0,'rgba(68,170,255,.3)');sg.addColorStop(1,'rgba(68,170,255,0)');
        ctx.fillStyle=sg;ctx.fillRect(psx-22,pl.y+PH/2-22,44,44);
        ctx.globalAlpha=1;
      }
      drawFlame(psx, pl.y+PH/2, PH*pl.size*0.7);
    }

    ctx.restore();

    // Menu flame
    if(state==='menu'){
      ctx.save();
      var mx=W/2,my=H*.33;
      drawFlame(mx,my,28+Math.sin(frame*.03)*3);
      if(frame%3===0) addP({x:mx+(Math.random()-.5)*15,y:my+(Math.random()-.5)*8,
        vx:(Math.random()-.5)*.5,vy:-Math.random()*2-1,sz:rng(3,6),life:1,dec:rng(.02,.03),t:'f'});
      for(var i=particles.length-1;i>=0;i--){
        var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=p.dec;
        if(p.life<=0){particles.splice(i,1);continue;}
        var t=1-p.life;ctx.globalAlpha=p.life*.7;
        ctx.fillStyle='rgb(255,'+Math.floor(180-t*140)+','+Math.max(0,Math.floor(50-t*50))+')';
        ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;ctx.restore();
    }
  }

  function drawFlame(x,y,size){
    var glow=ctx.createRadialGradient(x,y,0,x,y,size*3);
    glow.addColorStop(0,'rgba(255,107,43,.2)');glow.addColorStop(.5,'rgba(255,60,0,.05)');glow.addColorStop(1,'rgba(255,60,0,0)');
    ctx.fillStyle=glow;ctx.fillRect(x-size*3,y-size*3,size*6,size*6);
    var t=frame*.12;
    ctx.fillStyle='#fff8e0';ctx.globalAlpha=.9;ctx.beginPath();ctx.arc(x,y,size*.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff8c00';ctx.globalAlpha=.8;ctx.beginPath();ctx.arc(x+Math.sin(t)*2,y-size*.15,size*.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff4500';ctx.globalAlpha=.6;ctx.beginPath();ctx.arc(x+Math.sin(t*1.3)*3,y-size*.4+Math.sin(t*.7)*2,size*.65,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff6b2b';ctx.globalAlpha=.4+Math.sin(t*2)*.1;ctx.beginPath();ctx.arc(x+Math.sin(t*1.7)*2,y-size*.8+Math.sin(t)*3,size*.3,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  function drawPyre(x,y,h,lit){
    ctx.strokeStyle='#6b4226';ctx.lineWidth=4;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(x-12,y-2);ctx.lineTo(x+12,y-8);
    ctx.moveTo(x-10,y-6);ctx.lineTo(x+10,y-2);ctx.moveTo(x-6,y);ctx.lineTo(x+6,y-10);ctx.stroke();
    ctx.fillStyle='#3a3a3a';
    ctx.beginPath();ctx.arc(x-8,y,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+8,y,3.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x,y+1,3,0,Math.PI*2);ctx.fill();
    if(lit){
      var t=frame*.15;
      ctx.fillStyle='#ff6b2b';ctx.globalAlpha=.7;ctx.beginPath();ctx.arc(x+Math.sin(t)*2,y-h*.5,8,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffaa00';ctx.globalAlpha=.6;ctx.beginPath();ctx.arc(x+Math.sin(t*1.3),y-h*.7+Math.sin(t)*2,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff8e0';ctx.globalAlpha=.5;ctx.beginPath();ctx.arc(x,y-h*.4,4,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
      var glow=ctx.createRadialGradient(x,y,0,x,y,45);
      glow.addColorStop(0,'rgba(255,107,43,.08)');glow.addColorStop(1,'rgba(255,107,43,0)');
      ctx.fillStyle=glow;ctx.fillRect(x-45,y-45,90,90);
    } else {
      ctx.fillStyle='rgba(255,170,0,.12)';ctx.beginPath();ctx.arc(x,y-h*.4,5,0,Math.PI*2);ctx.fill();
    }
  }

  function drawWind(){
    var x=wind.sx,y=wind.y;if(x>W+50) return;
    ctx.save();ctx.translate(x,y);var t=frame*.06;
    ctx.globalAlpha=.12;ctx.strokeStyle='#8ecae6';ctx.lineWidth=2.5;
    for(var i=0;i<3;i++){ctx.beginPath();var off=i*Math.PI*2/3+t;
      for(var a=0;a<Math.PI*2;a+=.1){var r=15+Math.sin(a*3+off)*8;
        var px=Math.cos(a+off)*r,py=Math.sin(a+off)*r;
        if(a===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.stroke();}
    ctx.globalAlpha=.25;
    var cg=ctx.createRadialGradient(0,0,0,0,0,20);
    cg.addColorStop(0,'rgba(142,202,230,.5)');cg.addColorStop(.5,'rgba(100,160,200,.2)');cg.addColorStop(1,'rgba(100,160,200,0)');
    ctx.fillStyle=cg;ctx.fillRect(-20,-20,40,40);
    ctx.globalAlpha=.6;ctx.fillStyle='#b8e4f0';
    ctx.beginPath();ctx.arc(-5+Math.sin(t),- 3,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(5+Math.sin(t*1.1),-3,2.5,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.restore();
  }

  function drawMountains(){
    ctx.fillStyle='#1a1218';ctx.beginPath();ctx.moveTo(0,groundY);
    var o1=(camX*.05)%W;
    for(var x=0;x<=W+40;x+=40) ctx.lineTo(x,groundY-(60+Math.sin((x+o1)*.008)*40+Math.sin((x+o1)*.015)*20));
    ctx.lineTo(W,groundY);ctx.fill();
    ctx.fillStyle='#151010';ctx.beginPath();ctx.moveTo(0,groundY);
    var o2=(camX*.12)%W;
    for(var x=0;x<=W+30;x+=30) ctx.lineTo(x,groundY-(30+Math.sin((x+o2)*.012)*25+Math.sin((x+o2)*.025)*15));
    ctx.lineTo(W,groundY);ctx.fill();
  }

  function loop(){update();draw();requestAnimationFrame(loop);}
  loop();
})();
</script>
