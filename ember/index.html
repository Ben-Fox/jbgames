<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Ember — BrainSmacks</title>
<meta name="description" content="You are a tiny ember on a mission to light the pyres! Run, jump, and stay ahead of the Wind Spirit in this addictive platformer.">
<link rel="canonical" href="https://brainsmacks.com/ember/">
<meta property="og:title" content="Ember — BrainSmacks">
<meta property="og:description" content="Light the pyres, outrun the wind. How far can you go?">
<meta property="og:url" content="https://brainsmacks.com/ember/">
<meta property="og:type" content="website">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;overflow:hidden;height:100vh;height:100dvh;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Segoe UI',Roboto,'Helvetica Neue',sans-serif}
canvas{display:block;width:100%;height:100%}
#homeBtn{position:fixed;top:10px;left:10px;z-index:9999;background:rgba(255,255,255,.08);color:#ccc;text-decoration:none;padding:6px 14px;border-radius:20px;font-size:14px;opacity:.5;transition:opacity .2s}
#homeBtn:hover{opacity:1}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;pointer-events:none}
#ui.active{pointer-events:auto}
#title{font-size:52px;font-weight:900;color:#ff6b2b;text-shadow:0 0 40px rgba(255,107,43,.5),0 0 80px rgba(255,60,0,.3);letter-spacing:-2px;margin-bottom:4px}
#subtitle{color:#ff9a5c;font-size:14px;margin-bottom:24px;opacity:.7}
.menu-btn{background:linear-gradient(135deg,#ff6b2b,#ff4500);color:#fff;border:none;padding:14px 40px;border-radius:30px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(255,69,0,.4);letter-spacing:.5px;margin:4px}
.menu-btn:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(255,69,0,.6)}
.menu-btn:active{transform:translateY(1px)}
.menu-btn.sm{background:rgba(255,255,255,.08);box-shadow:none;padding:10px 24px;font-size:13px}
.menu-btn.sm:hover{background:rgba(255,255,255,.15)}
#hud{position:fixed;top:0;left:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:10px 16px;z-index:20;pointer-events:none}
#hud .hud-item{text-align:center}
#hud .hv{font-size:22px;font-weight:900;color:#ff9a5c;text-shadow:0 0 12px rgba(255,107,43,.3);line-height:1}
#hud .hl{font-size:9px;color:rgba(255,154,92,.4);text-transform:uppercase;letter-spacing:2px}
#fuel-wrap{width:100px;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-top:2px}
#fuel-fill{width:100%;height:100%;background:linear-gradient(90deg,#ff4500,#ff6b2b,#ffaa00);border-radius:3px;transition:width .15s;box-shadow:0 0 8px rgba(255,69,0,.5)}
#game-over{display:none;flex-direction:column;align-items:center}
#game-over.show{display:flex}
#go-score{font-size:64px;font-weight:900;color:#ff6b2b;text-shadow:0 0 40px rgba(255,107,43,.5);line-height:1;margin-bottom:0}
#go-label{font-size:12px;color:rgba(255,154,92,.5);text-transform:uppercase;letter-spacing:3px;margin-bottom:4px}
#go-best{font-size:14px;color:#ff9a5c;margin-bottom:4px;opacity:.6}
#go-new{font-size:13px;color:#ffaa00;font-weight:700;margin-bottom:8px;display:none}
.stats-row{display:flex;gap:20px;margin-bottom:20px}
.stat-box{text-align:center}
.stat-box .sv{font-size:22px;font-weight:800;color:#ff9a5c}
.stat-box .sl{font-size:10px;color:rgba(255,154,92,.4);text-transform:uppercase;letter-spacing:1px}
#start-screen{display:flex;flex-direction:column;align-items:center}
#instructions{color:rgba(255,154,92,.5);font-size:12px;margin-top:16px;text-align:center;line-height:1.8;max-width:280px}
#combo-display{position:fixed;top:50%;left:50%;transform:translate(-50%,-60%);z-index:15;pointer-events:none;font-size:36px;font-weight:900;color:#ffaa00;text-shadow:0 0 20px rgba(255,170,0,.6);opacity:0;transition:opacity .3s}
</style>
</head>
<body>
<a id="homeBtn" href="/">← BrainSmacks</a>
<canvas id="c"></canvas>
<div id="hud" style="display:none">
  <div class="hud-item"><div class="hl">Pyres</div><div class="hv" id="hud-pyres">0</div></div>
  <div class="hud-item"><div class="hl">Fuel</div><div id="fuel-wrap"><div id="fuel-fill"></div></div></div>
  <div class="hud-item"><div class="hl">Distance</div><div class="hv" id="hud-dist">0</div></div>
</div>
<div id="combo-display"></div>
<div id="ui" class="active">
  <div id="start-screen">
    <div id="title">Ember</div>
    <div id="subtitle">Light the pyres. Outrun the wind.</div>
    <button class="menu-btn" id="playBtn">Play</button>
    <div id="instructions">
      Jump: Space / Up / Tap<br>
      Move: Arrow keys / A,D<br>
      Light pyres to refuel<br>
      Stay ahead of the Wind Spirit
    </div>
  </div>
  <div id="game-over">
    <div id="go-label">Pyres Lit</div>
    <div id="go-score">0</div>
    <div id="go-new">New Best!</div>
    <div id="go-best">Best: 0</div>
    <div class="stats-row">
      <div class="stat-box"><div class="sv" id="go-dist">0</div><div class="sl">Distance</div></div>
      <div class="stat-box"><div class="sv" id="go-combo">0</div><div class="sl">Best Combo</div></div>
      <div class="stat-box"><div class="sv" id="go-time">0s</div><div class="sl">Time</div></div>
    </div>
    <button class="menu-btn" id="retryBtn">Try Again</button>
    <button class="menu-btn sm" id="menuBtn" style="margin-top:8px">Menu</button>
  </div>
</div>

<script>
(function(){
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var W, H, dpr;

  function resize(){
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // ---- Constants ----
  var GROUND_FRAC = 0.82;
  var PLAYER_W = 14;
  var PLAYER_H = 18;
  var RUN_SPEED = 3.2;
  var JUMP_VEL = -9.5;
  var GRAVITY = 0.45;
  var FUEL_MAX = 100;
  var FUEL_DRAIN = 0.06;
  var FUEL_PER_PYRE = 30;
  var WIND_START_OFFSET = -300;
  var WIND_BASE_SPEED = 2.6;
  var MAX_PARTICLES = 100;
  var PLAT_MIN_GAP = 80;
  var PLAT_MAX_GAP = 220;
  var PLAT_MIN_W = 100;
  var PLAT_MAX_W = 280;

  // ---- State ----
  var state = 'menu';
  var player = {};
  var platforms = [];
  var pyres = [];
  var particles = [];
  var windSpirit = {};
  var camX = 0;
  var groundY = 0;
  var score = 0;
  var distance = 0;
  var bestScore = 0;
  var combo = 0;
  var bestCombo = 0;
  var startTime = 0;
  var frameCount = 0;
  var screenShake = 0;
  var comboTimer = 0;
  var lastPlatEnd = 0;
  var keys = {};
  var touchJump = false;
  var touchLeft = false;
  var touchRight = false;

  try { bestScore = parseInt(localStorage.getItem('ember2_best')) || 0; } catch(e){}

  // ---- Particles ----
  function addP(p){
    if(particles.length >= MAX_PARTICLES) particles.shift();
    particles.push(p);
  }

  function spawnTrail(){
    var px = player.x - camX;
    var py = player.y;
    addP({
      x: px + (Math.random()-0.5)*8,
      y: py + PLAYER_H*0.3 + Math.random()*4,
      vx: -0.5 - Math.random()*0.5 + (player.vx||0)*-0.05,
      vy: -Math.random()*1.5 - 0.5,
      size: Math.random()*5+3,
      life: 1,
      decay: 0.025+Math.random()*0.015,
      type: 'flame'
    });
  }

  function spawnPyreFlame(px, py){
    for(var i=0;i<12;i++){
      addP({
        x: px + (Math.random()-0.5)*16,
        y: py + Math.random()*5,
        vx: (Math.random()-0.5)*2,
        vy: -Math.random()*4 - 2,
        size: Math.random()*7+3,
        life: 1,
        decay: 0.015+Math.random()*0.01,
        type: 'pyrelight'
      });
    }
  }

  function spawnWindParticle(){
    var wy = windSpirit.y;
    addP({
      x: windSpirit.sx + 20 + Math.random()*30,
      y: wy + (Math.random()-0.5)*40,
      vx: 2 + Math.random()*3,
      vy: (Math.random()-0.5)*1,
      size: Math.random()*4+2,
      life: 1,
      decay: 0.03+Math.random()*0.02,
      type: 'wind'
    });
  }

  function spawnDeath(){
    var px = player.x - camX;
    for(var i=0;i<25;i++){
      var a = Math.random()*Math.PI*2;
      var s = Math.random()*5+1;
      addP({
        x: px+(Math.random()-0.5)*16, y: player.y+(Math.random()-0.5)*16,
        vx: Math.cos(a)*s, vy: Math.sin(a)*s-2,
        size: Math.random()*7+3, life:1, decay:0.015+Math.random()*0.01,
        type:'death'
      });
    }
  }

  // ---- Platform generation ----
  function generatePlatform(startX){
    var w = PLAT_MIN_W + Math.random()*(PLAT_MAX_W-PLAT_MIN_W);
    // Height variation: some platforms are elevated
    var elevated = Math.random() < 0.3 && distance > 200;
    var yOff = elevated ? -(30 + Math.random()*50) : 0;
    var plat = {
      x: startX,
      y: groundY + yOff,
      w: w,
      h: 16,
      elevated: elevated
    };
    platforms.push(plat);

    // Place a pyre on most platforms
    if(Math.random() < 0.7 || platforms.length <= 2){
      pyres.push({
        x: plat.x + 30 + Math.random()*(plat.w - 60),
        y: plat.y,
        lit: false,
        h: 20
      });
    }

    return plat.x + plat.w;
  }

  function ensurePlatforms(){
    var viewRight = camX + W + 400;
    while(lastPlatEnd < viewRight){
      var gap = PLAT_MIN_GAP + Math.random()*(PLAT_MAX_GAP - PLAT_MIN_GAP);
      // Gaps get wider over time (but capped)
      gap += Math.min(distance*0.02, 60);
      gap = Math.min(gap, PLAT_MAX_GAP + 60);
      lastPlatEnd += gap;
      lastPlatEnd = generatePlatform(lastPlatEnd);
    }
    // Clean up off-screen left platforms and pyres
    var viewLeft = camX - 100;
    while(platforms.length > 0 && platforms[0].x + platforms[0].w < viewLeft){
      platforms.shift();
    }
    while(pyres.length > 0 && pyres[0].x + 20 < viewLeft){
      pyres.shift();
    }
  }

  // ---- Game logic ----
  function startGame(){
    state = 'play';
    groundY = H * GROUND_FRAC;
    camX = 0;
    distance = 0;
    score = 0;
    combo = 0;
    bestCombo = 0;
    comboTimer = 0;
    frameCount = 0;
    screenShake = 0;
    startTime = Date.now();
    particles = [];
    platforms = [];
    pyres = [];

    // Player (starts on first platform)
    player = {
      x: 100, // world x
      y: groundY - PLAYER_H,
      vx: 0,
      vy: 0,
      onGround: true,
      fuel: FUEL_MAX,
      size: 1,
      lastGroundY: groundY // track last platform surface for safety
    };

    // Wind Spirit
    windSpirit = {
      x: WIND_START_OFFSET, // world x
      sx: 0, // screen x (computed)
      y: groundY - 30,
      speed: WIND_BASE_SPEED
    };

    // Initial platforms
    lastPlatEnd = -50;
    // First platform is long and easy
    var firstPlat = {x:-50, y:groundY, w:400, h:16, elevated:false};
    platforms.push(firstPlat);
    pyres.push({x:200, y:groundY, lit:false, h:20});
    lastPlatEnd = firstPlat.x + firstPlat.w;

    ensurePlatforms();

    document.getElementById('ui').classList.remove('active');
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-over').classList.remove('show');
    document.getElementById('hud').style.display = '';
  }

  function die(){
    if(state !== 'play') return;
    state = 'dead';
    spawnDeath();
    screenShake = 12;

    var finalScore = score;
    var isNew = finalScore > bestScore;
    if(isNew){
      bestScore = finalScore;
      try { localStorage.setItem('ember2_best', bestScore); } catch(e){}
    }

    var elapsed = ((Date.now()-startTime)/1000)|0;
    setTimeout(function(){
      document.getElementById('go-score').textContent = finalScore;
      document.getElementById('go-best').textContent = 'Best: ' + bestScore;
      document.getElementById('go-dist').textContent = Math.floor(distance);
      document.getElementById('go-combo').textContent = bestCombo + 'x';
      document.getElementById('go-time').textContent = elapsed + 's';
      document.getElementById('go-new').style.display = isNew ? '' : 'none';
      document.getElementById('game-over').classList.add('show');
      document.getElementById('ui').classList.add('active');
      document.getElementById('hud').style.display = 'none';
    }, 600);
  }

  // ---- Input ----
  document.addEventListener('keydown', function(e){
    keys[e.key] = true;
    if(e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') e.preventDefault();
  });
  document.addEventListener('keyup', function(e){ keys[e.key] = false; });

  canvas.addEventListener('touchstart', function(e){
    e.preventDefault();
    for(var i=0;i<e.touches.length;i++){
      var tx = e.touches[i].clientX;
      if(tx < W*0.35) touchLeft = true;
      else if(tx > W*0.65) touchRight = true;
      else touchJump = true;
    }
  }, {passive:false});

  canvas.addEventListener('touchend', function(e){
    e.preventDefault();
    touchLeft = false; touchRight = false; touchJump = false;
    for(var i=0;i<e.touches.length;i++){
      var tx = e.touches[i].clientX;
      if(tx < W*0.35) touchLeft = true;
      else if(tx > W*0.65) touchRight = true;
      else touchJump = true;
    }
  }, {passive:false});

  canvas.addEventListener('mousedown', function(e){
    if(state === 'play'){
      if(e.clientX < W*0.35) touchLeft = true;
      else if(e.clientX > W*0.65) touchRight = true;
      else touchJump = true;
    }
  });
  canvas.addEventListener('mouseup', function(){ touchLeft=false; touchRight=false; touchJump=false; });

  document.getElementById('playBtn').addEventListener('click', startGame);
  document.getElementById('retryBtn').addEventListener('click', startGame);
  document.getElementById('menuBtn').addEventListener('click', function(){
    document.getElementById('game-over').classList.remove('show');
    document.getElementById('start-screen').style.display = 'flex';
  });

  function wantLeft(){ return keys['ArrowLeft']||keys['a']||keys['A']||touchLeft; }
  function wantRight(){ return keys['ArrowRight']||keys['d']||keys['D']||touchRight; }
  function wantJump(){ return keys[' ']||keys['ArrowUp']||keys['w']||keys['W']||touchJump; }

  // ---- Update ----
  function update(){
    if(state !== 'play') return;
    frameCount++;
    if(frameCount > 1e8) frameCount -= 1e8;

    // Auto-run forward + manual control
    var moveSpeed = RUN_SPEED + Math.min(distance*0.001, 2);
    var inputX = 0;
    if(wantLeft()) inputX = -1;
    if(wantRight()) inputX = 1;

    // Auto-run: always moving right, player can speed up or slow down
    player.vx = moveSpeed + inputX * 2.5;
    player.x += player.vx;

    // Jump
    if(wantJump() && player.onGround){
      player.vy = JUMP_VEL;
      player.onGround = false;
    }

    // Gravity
    player.vy += GRAVITY;
    player.y += player.vy;

    // Platform collision (check all, pick highest valid landing)
    player.onGround = false;
    var bestLandY = Infinity;
    for(var i=0; i<platforms.length; i++){
      var p = platforms[i];
      // Horizontal overlap check (player center must be on platform)
      if(player.x > p.x && player.x < p.x + p.w){
        var playerBottom = player.y + PLAYER_H;
        var prevBottom = playerBottom - player.vy; // where we were last frame
        // Landing: falling downward, crossed the platform surface this frame
        if(player.vy >= 0 && prevBottom <= p.y + 4 && playerBottom >= p.y - 2){
          if(p.y < bestLandY){
            bestLandY = p.y;
          }
        }
        // Already resting on platform (within tolerance)
        if(Math.abs(playerBottom - p.y) < 3 && player.vy >= 0){
          if(p.y < bestLandY){
            bestLandY = p.y;
          }
        }
      }
    }
    if(bestLandY < Infinity){
      player.y = bestLandY - PLAYER_H;
      player.vy = 0;
      player.onGround = true;
    }

    // Fall death (below screen)
    if(player.y > H + 50){
      die();
      return;
    }

    // Fuel drain
    player.fuel -= FUEL_DRAIN + Math.min(distance*0.00003, 0.04);
    player.fuel = Math.max(0, player.fuel);
    player.size = 0.5 + 0.5*(player.fuel/FUEL_MAX);

    if(player.fuel <= 0){
      die();
      return;
    }

    // Camera follows player
    var targetCamX = player.x - W*0.3;
    camX += (targetCamX - camX) * 0.08;

    distance = player.x / 10;

    // Ensure platforms ahead
    ensurePlatforms();

    // Pyre collision
    var playerScreenX = player.x - camX;
    for(var i=0; i<pyres.length; i++){
      var pyre = pyres[i];
      if(pyre.lit) continue;
      var pyreScreenX = pyre.x - camX;
      var dx = player.x - pyre.x;
      var dy = (player.y + PLAYER_H) - pyre.y;
      if(Math.abs(dx) < 20 && Math.abs(dy) < 30){
        pyre.lit = true;
        score++;
        player.fuel = Math.min(FUEL_MAX, player.fuel + FUEL_PER_PYRE);
        combo++;
        if(combo > bestCombo) bestCombo = combo;
        comboTimer = 120;
        spawnPyreFlame(pyreScreenX, pyre.y - pyre.h);
        screenShake = 3;

        // Show combo
        if(combo >= 2){
          var cd = document.getElementById('combo-display');
          cd.textContent = combo + 'x COMBO';
          cd.style.opacity = '1';
          setTimeout(function(){ cd.style.opacity = '0'; }, 800);
        }
      }
    }

    // Combo timer
    if(comboTimer > 0){
      comboTimer--;
      if(comboTimer <= 0) combo = 0;
    }

    // Wind Spirit
    windSpirit.speed = WIND_BASE_SPEED + Math.min(distance*0.003, 3);
    // Wind tries to keep pace, slightly behind player
    var targetWindX = player.x - W*0.6;
    windSpirit.x += (targetWindX - windSpirit.x) * 0.015 + windSpirit.speed * 0.3;
    // Wind never goes too far behind
    if(windSpirit.x < player.x - W*0.8) windSpirit.x = player.x - W*0.8;
    windSpirit.sx = windSpirit.x - camX;
    windSpirit.y = groundY - 25 + Math.sin(frameCount*0.04)*8;

    // Wind catches player = death
    if(windSpirit.sx > playerScreenX - 15){
      die();
      return;
    }

    // Wind blows out pyres it passes
    for(var i=0; i<pyres.length; i++){
      if(pyres[i].lit && pyres[i].x < windSpirit.x + 10){
        pyres[i].lit = false;
      }
    }

    // Update HUD
    document.getElementById('hud-pyres').textContent = score;
    document.getElementById('hud-dist').textContent = Math.floor(distance);
    document.getElementById('fuel-fill').style.width = player.fuel + '%';

    // Particles
    if(frameCount % 2 === 0) spawnTrail();
    if(frameCount % 4 === 0) spawnWindParticle();
  }

  // ---- Draw ----
  function draw(){
    ctx.clearRect(0,0,W,H);

    var sx=0, sy=0;
    if(screenShake > 0){
      sx = (Math.random()-0.5)*screenShake*2;
      sy = (Math.random()-0.5)*screenShake*2;
      screenShake *= 0.85;
      if(screenShake < 0.5) screenShake = 0;
    }
    ctx.save();
    ctx.translate(sx, sy);

    // Sky gradient
    var nightProgress = Math.min(1, distance/1000);
    var skyTop = lerpColor([15,15,35], [5,2,20], nightProgress);
    var skyBot = lerpColor([35,20,50], [15,8,30], nightProgress);
    var grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0, 'rgb('+skyTop.join(',')+')');
    grad.addColorStop(1, 'rgb('+skyBot.join(',')+')');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    // Stars
    ctx.fillStyle = '#fff';
    for(var i=0;i<40;i++){
      var starX = ((i*137+50) % (W+200)) - 100;
      var starY = ((i*89+30) % (groundY-50));
      ctx.globalAlpha = 0.15 + 0.1*Math.sin(frameCount*0.015+i*2);
      ctx.beginPath();
      ctx.arc(starX, starY, 0.5+Math.sin(i)*0.5, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Distant mountains (parallax)
    drawMountains();

    // Void/pit below platform level
    ctx.fillStyle = '#050308';
    ctx.fillRect(0, groundY-2, W, H-groundY+2);

    // Platforms (drawn as solid ground chunks — gaps are visible pits)
    for(var i=0;i<platforms.length;i++){
      var p = platforms[i];
      var px = p.x - camX;
      if(px + p.w < -20 || px > W+20) continue;

      if(p.elevated){
        // Elevated platform
        ctx.fillStyle = '#3d2e22';
        ctx.fillRect(px, p.y, p.w, p.h);
        ctx.fillStyle = '#4a3828';
        ctx.fillRect(px, p.y, p.w, 3);
        // Support posts
        ctx.fillStyle = '#2a1e15';
        ctx.fillRect(px+10, p.y+p.h, 6, groundY-p.y-p.h);
        ctx.fillRect(px+p.w-16, p.y+p.h, 6, groundY-p.y-p.h);
        // Ground beneath supports
        ctx.fillStyle = '#1a1210';
        ctx.fillRect(px, groundY, p.w, H-groundY);
        ctx.fillStyle = '#2a1e18';
        ctx.fillRect(px, groundY-1, p.w, 3);
      } else {
        // Ground-level platform: solid earth
        ctx.fillStyle = '#1a1210';
        ctx.fillRect(px, p.y, p.w, H-p.y);
        // Top surface
        ctx.fillStyle = '#2a1e18';
        ctx.fillRect(px, p.y-1, p.w, 4);
        // Dirt texture
        ctx.fillStyle = '#1e1510';
        ctx.fillRect(px, p.y+8, p.w, 2);
        ctx.fillStyle = '#161010';
        ctx.fillRect(px, p.y+20, p.w, 1);
      }

      // Edge shading (left/right sides of platform)
      ctx.fillStyle = 'rgba(0,0,0,.3)';
      ctx.fillRect(px, p.y, 2, H-p.y);
      ctx.fillRect(px+p.w-2, p.y, 2, H-p.y);
    }

    // (gaps visible as dark pits between platforms)

    // Pyres
    for(var i=0;i<pyres.length;i++){
      var pyre = pyres[i];
      var px = pyre.x - camX;
      if(px < -30 || px > W+30) continue;
      drawPyre(px, pyre.y, pyre.h, pyre.lit);
    }

    // Wind Spirit
    if(state === 'play' || state === 'dead'){
      drawWindSpirit();
    }

    // Particles
    for(var i=particles.length-1;i>=0;i--){
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      if(p.life <= 0){ particles.splice(i,1); continue; }

      if(p.type === 'flame'){
        var t=1-p.life;
        ctx.globalAlpha = p.life*0.7;
        ctx.fillStyle = 'rgb(255,'+Math.floor(180-t*140)+','+Math.max(0,Math.floor(50-t*50))+')';
      } else if(p.type === 'pyrelight'){
        var t=1-p.life;
        ctx.globalAlpha = p.life*0.8;
        ctx.fillStyle = t<0.3?'#fff8e0':t<0.5?'#ffaa00':'#ff4500';
        p.vy -= 0.02;
      } else if(p.type === 'wind'){
        ctx.globalAlpha = p.life*0.4;
        ctx.fillStyle = '#8ecae6';
      } else if(p.type === 'death'){
        ctx.globalAlpha = p.life*0.8;
        ctx.fillStyle = p.life>0.5?'#ff6b2b':'#880000';
        p.vy += 0.08;
      }

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Player (ember)
    if(state === 'play'){
      var px = player.x - camX;
      var py = player.y;
      var s = PLAYER_H * player.size;
      drawFlame(px, py + PLAYER_H/2, s*0.7);
    }

    ctx.restore();

    // Menu flame
    if(state === 'menu'){
      ctx.save();
      var mx = W/2;
      var my = H*0.33;
      drawFlame(mx, my, 28 + Math.sin(frameCount*0.03)*3);
      if(frameCount % 3 === 0){
        addP({
          x: mx+(Math.random()-0.5)*15, y: my+(Math.random()-0.5)*8,
          vx:(Math.random()-0.5)*0.5, vy:-Math.random()*2-1,
          size:Math.random()*5+3, life:1, decay:0.02+Math.random()*0.015,
          type:'flame'
        });
      }
      // Draw particles for menu
      for(var i=particles.length-1;i>=0;i--){
        var p=particles[i];
        p.x+=p.vx; p.y+=p.vy; p.life-=p.decay;
        if(p.life<=0){particles.splice(i,1);continue;}
        var t=1-p.life;
        ctx.globalAlpha=p.life*0.7;
        ctx.fillStyle='rgb(255,'+Math.floor(180-t*140)+','+Math.max(0,Math.floor(50-t*50))+')';
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha=1;
      ctx.restore();
    }
  }

  function drawFlame(x, y, size){
    var glow = ctx.createRadialGradient(x, y, 0, x, y, size*3);
    glow.addColorStop(0, 'rgba(255,107,43,.2)');
    glow.addColorStop(0.5, 'rgba(255,60,0,.05)');
    glow.addColorStop(1, 'rgba(255,60,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(x-size*3, y-size*3, size*6, size*6);

    var t = frameCount*0.12;

    ctx.fillStyle='#fff8e0';ctx.globalAlpha=0.9;
    ctx.beginPath();ctx.arc(x,y,size*0.3,0,Math.PI*2);ctx.fill();

    ctx.fillStyle='#ff8c00';ctx.globalAlpha=0.8;
    ctx.beginPath();ctx.arc(x+Math.sin(t)*2,y-size*0.15,size*0.5,0,Math.PI*2);ctx.fill();

    ctx.fillStyle='#ff4500';ctx.globalAlpha=0.6;
    ctx.beginPath();ctx.arc(x+Math.sin(t*1.3)*3,y-size*0.4+Math.sin(t*0.7)*2,size*0.65,0,Math.PI*2);ctx.fill();

    ctx.fillStyle='#ff6b2b';ctx.globalAlpha=0.4+Math.sin(t*2)*0.1;
    ctx.beginPath();ctx.arc(x+Math.sin(t*1.7)*2,y-size*0.8+Math.sin(t)*3,size*0.3,0,Math.PI*2);ctx.fill();

    ctx.globalAlpha=1;
  }

  function drawPyre(x, y, h, lit){
    // Wood logs (crossed sticks)
    ctx.strokeStyle = '#6b4226';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x-12, y-2); ctx.lineTo(x+12, y-8);
    ctx.moveTo(x-10, y-6); ctx.lineTo(x+10, y-2);
    ctx.moveTo(x-6, y); ctx.lineTo(x+6, y-10);
    ctx.stroke();

    // Dark base stones
    ctx.fillStyle = '#3a3a3a';
    ctx.beginPath();
    ctx.arc(x-8, y, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.arc(x+8, y, 3.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.arc(x, y+1, 3, 0, Math.PI*2); ctx.fill();

    if(lit){
      // Fire on the pyre
      var t = frameCount*0.15;
      ctx.fillStyle='#ff6b2b'; ctx.globalAlpha=0.7;
      ctx.beginPath(); ctx.arc(x+Math.sin(t)*2, y-h*0.5, 8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffaa00'; ctx.globalAlpha=0.6;
      ctx.beginPath(); ctx.arc(x+Math.sin(t*1.3), y-h*0.7+Math.sin(t)*2, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff8e0'; ctx.globalAlpha=0.5;
      ctx.beginPath(); ctx.arc(x, y-h*0.4, 4, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;

      // Light glow on ground
      var glow = ctx.createRadialGradient(x, y, 0, x, y, 50);
      glow.addColorStop(0, 'rgba(255,107,43,.1)');
      glow.addColorStop(1, 'rgba(255,107,43,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(x-50, y-50, 100, 100);
    } else {
      // Unlit indicator: subtle glow
      ctx.fillStyle = 'rgba(255,170,0,.15)';
      ctx.beginPath();
      ctx.arc(x, y-h*0.4, 6, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function drawWindSpirit(){
    var x = windSpirit.sx;
    var y = windSpirit.y;
    if(x > W+50) return;

    // Swirling vortex
    ctx.save();
    ctx.translate(x, y);
    var t = frameCount*0.06;

    // Outer swirl
    ctx.globalAlpha = 0.15;
    ctx.strokeStyle = '#8ecae6';
    ctx.lineWidth = 3;
    for(var i=0;i<3;i++){
      ctx.beginPath();
      var offset = i*Math.PI*2/3 + t;
      for(var a=0;a<Math.PI*2;a+=0.1){
        var r = 15 + Math.sin(a*3+offset)*8;
        var px = Math.cos(a+offset)*r;
        var py = Math.sin(a+offset)*r;
        if(a===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }

    // Core
    ctx.globalAlpha = 0.25;
    var coreGrad = ctx.createRadialGradient(0,0,0,0,0,20);
    coreGrad.addColorStop(0, 'rgba(142,202,230,.5)');
    coreGrad.addColorStop(0.5, 'rgba(100,160,200,.2)');
    coreGrad.addColorStop(1, 'rgba(100,160,200,0)');
    ctx.fillStyle = coreGrad;
    ctx.fillRect(-20,-20,40,40);

    // Eyes
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#b8e4f0';
    ctx.beginPath(); ctx.arc(-5+Math.sin(t)*1, -3, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5+Math.sin(t*1.1)*1, -3, 2.5, 0, Math.PI*2); ctx.fill();

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawMountains(){
    // Layer 1: far mountains (slow parallax)
    ctx.fillStyle = '#1a1218';
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    var offset1 = (camX * 0.05) % W;
    for(var x=0; x<=W+40; x+=40){
      var h = 60 + Math.sin((x+offset1)*0.008)*40 + Math.sin((x+offset1)*0.015)*20;
      ctx.lineTo(x, groundY - h);
    }
    ctx.lineTo(W, groundY);
    ctx.fill();

    // Layer 2: closer hills
    ctx.fillStyle = '#151010';
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    var offset2 = (camX * 0.12) % W;
    for(var x=0; x<=W+30; x+=30){
      var h = 30 + Math.sin((x+offset2)*0.012)*25 + Math.sin((x+offset2)*0.025)*15;
      ctx.lineTo(x, groundY - h);
    }
    ctx.lineTo(W, groundY);
    ctx.fill();
  }

  function lerpColor(a, b, t){
    return [
      Math.floor(a[0]+(b[0]-a[0])*t),
      Math.floor(a[1]+(b[1]-a[1])*t),
      Math.floor(a[2]+(b[2]-a[2])*t)
    ];
  }

  // ---- Loop ----
  function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
